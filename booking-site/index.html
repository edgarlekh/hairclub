<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAIR CLUB — Онлайн-запись</title>
<style>
  :root { --gradient: linear-gradient(135deg, #d9a066, #f0c896); --text:#2b2620; --muted:#8a8072; --border:#ecе4d8; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,"Segoe UI",Roboto,sans-serif; background:#faf8f5; color:var(--text); }
  header { background: var(--gradient); padding: 28px 20px; color:white; text-align:center; }
  header h1 { margin:0; font-size:20px; }
  main { max-width: 480px; margin: 0 auto; padding: 20px; }
  .step { display:none; }
  .step.active { display:block; }
  .card { background:white; border:1px solid var(--border); border-radius:14px; padding:14px; margin-bottom:10px; cursor:pointer; }
  .card:hover { border-color:#d9a066; }
  .card h3 { margin:0 0 4px; font-size:15px; }
  .card p { margin:0; font-size:13px; color:var(--muted); }
  .price { color:#b8763a; font-weight:600; }
  .slots { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
  .slot { padding:10px 14px; border:1px solid var(--border); border-radius:10px; cursor:pointer; font-size:14px; }
  .slot:hover, .slot.selected { background: var(--gradient); color:white; border-color:transparent; }
  input, label { display:block; width:100%; }
  label { font-size:12px; color:var(--muted); margin:12px 0 4px; }
  input { padding:11px; border:1px solid var(--border); border-radius:8px; font-size:14px; }
  .btn { width:100%; padding:14px; background:var(--gradient); color:white; border:none; border-radius:10px; font-size:15px; font-weight:600; margin-top:16px; cursor:pointer; }
  .back { background:none; border:none; color:var(--muted); font-size:14px; margin-bottom:14px; cursor:pointer; }
  .success { text-align:center; padding: 40px 0; }
  .empty { text-align:center; color:var(--muted); padding:30px 0; }
</style>
</head>
<body>

<header><h1>HAIR CLUB</h1><p style="margin:6px 0 0; font-size:13px; opacity:0.9;">Онлайн-запись</p></header>

<main>
  <div class="step active" id="step-service">
    <div id="services-list" class="empty">Загрузка услуг...</div>
  </div>

  <div class="step" id="step-employee">
    <button class="back" onclick="goToStep('service')">← Назад к услугам</button>
    <div id="employees-list" class="empty"></div>
  </div>

  <div class="step" id="step-date">
    <button class="back" onclick="goToStep('employee')">← Назад к мастерам</button>
    <label>Выбери дату</label>
    <input type="date" id="date-input" onchange="loadSlots()">
    <div id="slots-list" class="slots"></div>
  </div>

  <div class="step" id="step-contact">
    <button class="back" onclick="goToStep('date')">← Назад к выбору времени</button>
    <label>Ваше имя</label>
    <input id="client-name" placeholder="Как к вам обращаться">
    <label>Телефон</label>
    <input id="client-phone" placeholder="+48 ...">
    <button class="btn" onclick="submitBooking()">Подтвердить запись</button>
  </div>

  <div class="step" id="step-success">
    <div class="success">
      <h2>Готово! 🎉</h2>
      <p>Ваша запись подтверждена. Ждём вас!</p>
    </div>
  </div>
</main>

<script>
const API_BASE = "https://salon-agent.YOUR-SUBDOMAIN.workers.dev/public";

let state = { service: null, employee: null, date: null, time: null };

function goToStep(name) {
  document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
  document.getElementById(`step-${name}`).classList.add("active");
}

async function api(path) {
  const res = await fetch(`${API_BASE}${path}`);
  return res.json();
}

async function loadServices() {
  const services = await api("/services");
  const el = document.getElementById("services-list");
  if (!services.length) { el.innerHTML = `<div class="empty">Услуг пока нет</div>`; return; }
  el.innerHTML = services.map(s => `
    <div class="card" onclick='selectService(${JSON.stringify(s)})'>
      <h3>${s.name}</h3>
      <p><span class="price">${s.price_min}–${s.price_max} ${s.currency}</span> · ${s.duration_minutes} мин</p>
    </div>
  `).join("");
}

async function selectService(service) {
  state.service = service;
  const employees = await api(`/employees?service_id=${service.id}`);
  const el = document.getElementById("employees-list");
  el.innerHTML = employees.length
    ? employees.map(e => `<div class="card" onclick='selectEmployee(${JSON.stringify(e)})'><h3>${e.name}</h3></div>`).join("")
    : `<div class="empty">Нет доступных мастеров для этой услуги</div>`;
  goToStep("employee");
}

function selectEmployee(employee) {
  state.employee = employee;
  document.getElementById("date-input").min = new Date().toISOString().slice(0, 10);
  goToStep("date");
}

async function loadSlots() {
  const date = document.getElementById("date-input").value;
  if (!date) return;
  state.date = date;
  const result = await api(`/slots?employee_id=${state.employee.id}&service_id=${state.service.id}&date=${date}`);
  const el = document.getElementById("slots-list");
  if (result.error) { el.innerHTML = `<div class="empty">${result.error}</div>`; return; }
  if (!result.slots || !result.slots.length) { el.innerHTML = `<div class="empty">${result.note || "Нет свободных слотов на эту дату"}</div>`; return; }
  el.innerHTML = result.slots.map(t => `<div class="slot" onclick="selectTime('${t}', this)">${t}</div>`).join("");
}

function selectTime(time, el) {
  document.querySelectorAll(".slot").forEach(s => s.classList.remove("selected"));
  el.classList.add("selected");
  state.time = time;
  setTimeout(() => goToStep("contact"), 300);
}

async function submitBooking() {
  const client_name = document.getElementById("client-name").value.trim();
  const client_phone = document.getElementById("client-phone").value.trim();
  if (!client_name || !client_phone) { alert("Заполни имя и телефон"); return; }

  const res = await fetch(`${API_BASE}/book`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      service_id: state.service.id,
      employee_id: state.employee.id,
      date: state.date,
      time: state.time,
      client_name, client_phone,
    }),
  });
  const result = await res.json();
  if (result.ok) {
    goToStep("success");
  } else {
    alert(result.error || "Не получилось создать запись, попробуй другое время");
  }
}

loadServices();
</script>
</body>
</html>
