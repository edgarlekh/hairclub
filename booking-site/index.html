<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAIR CLUB — Онлайн-запись</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Poppins:wght@300;400;500;600;700&family=Alex+Brush&display=swap" rel="stylesheet">
<style>
  :root {
    --gold-1: #9c6b3e;
    --gold-2: #d9ad78;
    --gradient: linear-gradient(135deg, var(--gold-1), var(--gold-2));
    --gold-mid: #b8824f;
    --sage: #7c9473;
    --sage-light: #eaf0e6;
    --bg: #fdfbf7;
    --text: #2b2420;
    --muted: #8a8072;
    --border: #ece4d8;
    --font-heading: "Cormorant Garamond", Georgia, serif;
    --font-body: "Poppins", -apple-system, "Segoe UI", Roboto, sans-serif;
    --font-script: "Alex Brush", cursive;
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family: var(--font-body); background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
  header { background: var(--gradient); padding: 36px 20px 30px; color: white; text-align: center; }
  .brand-mark { width: 46px; height: 46px; margin-bottom: 8px; }
  header h1 { margin: 0; font-weight: 300; letter-spacing: 3px; font-size: 22px; text-transform: uppercase; }
  header .tagline { margin: 6px 0 0; font-family: var(--font-heading); font-style: italic; font-weight: 500; font-size: 14px; opacity: 0.92; }

  .progress { display: flex; justify-content: center; gap: 8px; padding: 16px 20px 0; }
  .progress .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); transition: background 0.2s, transform 0.2s; }
  .progress .dot.done { background: var(--gold-2); }
  .progress .dot.current { background: var(--gold-1); transform: scale(1.3); }

  main { max-width: 480px; margin: 0 auto; padding: 20px; }
  .step { display:none; }
  .step.active { display:block; }
  .step-title { font-family: var(--font-heading); font-weight: 600; font-size: 20px; margin: 4px 0 14px; color: var(--gold-1); }
  .card { background:white; border:1px solid var(--border); border-radius:14px; padding:15px; margin-bottom:10px; cursor:pointer; box-shadow: 0 2px 10px rgba(156,107,62,0.06); transition: box-shadow 0.15s, border-color 0.15s; }
  .card:hover { border-color: var(--gold-2); box-shadow: 0 4px 16px rgba(156,107,62,0.12); }
  .card h3 { margin:0 0 4px; font-family: var(--font-heading); font-weight: 600; font-size: 17px; }
  .card p { margin:0; font-size:13px; color:var(--muted); }
  .price { color: var(--gold-mid); font-weight:600; }
  .group-head { font-family: var(--font-heading); font-size:15px; font-weight:600; color: var(--gold-mid);
                margin: 20px 0 8px; }
  .group-head:first-child { margin-top: 0; }

  /* Выбранная услуга — напоминание, что человек уже выбрал */
  .chosen { background:white; border:1px solid var(--border); border-radius:12px; padding:10px 13px; margin-bottom:14px; }
  .chosen b { display:block; font-size:14px; }
  .chosen span { font-size:12px; color:var(--muted); }

  /* Лента дней: сразу видно, где есть места, а где нет */
  .days-strip { display:flex; gap:8px; overflow-x:auto; padding:2px 0 10px; -webkit-overflow-scrolling:touch; }
  .day { flex:none; min-width:62px; border:1px solid var(--border); background:white; border-radius:12px;
         padding:8px 6px; text-align:center; cursor:pointer; font-family:inherit; transition:border-color .15s; }
  .day:hover:not(.empty-day) { border-color: var(--gold-2); }
  .day b { display:block; font-size:17px; font-family:var(--font-heading); }
  .day small { display:block; font-size:10px; color:var(--muted); text-transform:lowercase; }
  .day .free { display:block; font-size:10px; color:var(--gold-mid); margin-top:3px; }
  .day.selected { background:var(--gradient); border-color:transparent; color:white; }
  .day.selected small, .day.selected .free { color:rgba(255,255,255,.85); }
  .day.empty-day { opacity:.4; cursor:not-allowed; }

  .period { margin-top:16px; }
  .period-name { font-size:12px; color:var(--muted); margin-bottom:7px; }
  .slot small { display:block; font-size:10px; opacity:.7; }
  .no-slots { text-align:center; color:var(--muted); font-size:14px; padding:22px 10px; }
  .slots { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
  .slot { padding:10px 14px; border:1px solid var(--border); border-radius:10px; cursor:pointer; font-size:14px; background: white; transition: background 0.15s, color 0.15s, border-color 0.15s; }
  .slot:hover, .slot.selected { background: var(--gradient); color:white; border-color:transparent; }
  input, label { display:block; width:100%; }
  label { font-size:12px; color:var(--muted); margin:12px 0 4px; }
  input { padding:11px; border:1px solid var(--border); border-radius:8px; font-size:14px; font-family: inherit; background: white; }
  input:focus { outline: none; border-color: var(--gold-2); }
  .btn { width:100%; padding:14px; background:var(--gradient); color:white; border:none; border-radius:10px; font-size:15px; font-weight:600; letter-spacing: 0.3px; margin-top:16px; cursor:pointer; }
  .back { background:none; border:none; color:var(--muted); font-size:13px; margin-bottom:14px; cursor:pointer; padding: 0; }
  .back:hover { color: var(--gold-1); }
  .success { text-align:center; padding: 50px 0; }
  .success .brand-mark { width: 44px; height: 44px; margin: 0 auto 14px; }
  .success h2 { font-family: var(--font-heading); font-weight: 600; font-size: 24px; color: var(--gold-1); margin: 0 0 8px; }
  .success p { color: var(--muted); font-size: 14px; }
  .empty { text-align:center; color:var(--muted); padding:30px 0; }
</style>
</head>
<body>

<header>
  <svg class="brand-mark" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <circle cx="24" cy="24" r="17" stroke="white" stroke-width="2"/>
    <path d="M15 15v18M15 24h7M22 15v18" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <path d="M32 12l1.4 3.6L37 17l-3.6 1.4L32 22l-1.4-3.6L27 17l3.6-1.4L32 12z" fill="white"/>
  </svg>
  <h1>Hair Club</h1>
  <p class="tagline">Онлайн-запись</p>
</header>

<div class="progress" id="progress">
  <div class="dot" data-step="service"></div>
  <div class="dot" data-step="date"></div>
  <div class="dot" data-step="contact"></div>
</div>

<main>
  <div class="step active" id="step-service">
    <div class="step-title">Выберите услугу</div>
    <div id="services-list" class="empty">Загрузка услуг...</div>
  </div>

  <div class="step" id="step-date">
    <button class="back" onclick="goToStep('service')">← Назад к услугам</button>
    <div class="step-title">Когда вам удобно?</div>
    <div id="chosen-service" class="chosen"></div>
    <div id="days-strip" class="days-strip"></div>
    <div id="slots-list"></div>
  </div>

  <div class="step" id="step-contact">
    <button class="back" onclick="goToStep('date')">← Назад к выбору времени</button>
    <div class="step-title">Ваши данные</div>
    <label>Ваше имя</label>
    <input id="client-name" placeholder="Как к вам обращаться">
    <label>Телефон</label>
    <input id="client-phone" placeholder="+48 ...">
    <button class="btn" onclick="submitBooking()">Подтвердить запись</button>
  </div>

  <div class="step" id="step-success">
    <div class="success">
      <svg class="brand-mark" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="24" cy="24" r="17" stroke="#9c6b3e" stroke-width="2"/>
        <path d="M15 15v18M15 24h7M22 15v18" stroke="#9c6b3e" stroke-width="2" stroke-linecap="round"/>
        <path d="M32 12l1.4 3.6L37 17l-3.6 1.4L32 22l-1.4-3.6L27 17l3.6-1.4L32 12z" fill="#9c6b3e"/>
      </svg>
      <h2>Готово!</h2>
      <p>Ваша запись подтверждена. Ждём вас!</p>
    </div>
  </div>
</main>

<script>
const API_BASE = "https://salon-agent.edgar-lekh99.workers.dev/public";

let state = { service: null, employee: null, date: null, time: null };

const STEP_ORDER = ["service", "date", "contact", "success"];

function goToStep(name) {
  document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
  document.getElementById(`step-${name}`).classList.add("active");
  updateProgress(name);
}

function updateProgress(name) {
  const idx = STEP_ORDER.indexOf(name);
  document.querySelectorAll(".progress .dot").forEach(dot => {
    const dotIdx = STEP_ORDER.indexOf(dot.dataset.step);
    dot.classList.toggle("done", dotIdx < idx);
    dot.classList.toggle("current", dotIdx === idx);
  });
  document.getElementById("progress").style.display = name === "success" ? "none" : "flex";
}

async function api(path) {
  const res = await fetch(`${API_BASE}${path}`);
  return res.json();
}

// Цена и время приходят диапазоном. Когда «от» и «до» совпадают, показываем одно число,
// иначе получается «200–200 PLN».
function fmtRange(min, max, unit) {
  if (min == null && max == null) return "";
  if (min == null || max == null || Number(min) === Number(max)) return `${min ?? max} ${unit}`;
  return `${min}–${max} ${unit}`;
}

async function loadServices() {
  const services = await api("/services");
  const el = document.getElementById("services-list");
  if (!services.length) { el.innerHTML = `<div class="empty">Услуг пока нет</div>`; return; }

  // Раскладываем по категориям — иначе 83 услуги одним списком не выбрать
  const groups = new Map();
  for (const s of services) {
    const key = s.category_name || "Прочее";
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(s);
  }

  el.innerHTML = [...groups.entries()].map(([cat, list]) => `
    <h3 class="group-head">${cat}</h3>
    ${list.map(s => {
      const time = fmtRange(s.duration_min, s.duration_max, "мин");
      return `
      <div class="card" onclick='selectService(${JSON.stringify(s).replace(/'/g, "&#39;")})'>
        <h3>${s.name}</h3>
        <p><span class="price">${fmtRange(s.price_min, s.price_max, s.currency || "PLN")}</span>${time ? " · " + time : ""}</p>
      </div>`;
    }).join("")}
  `).join("");
}

const DAY_SHORT = ["вс", "пн", "вт", "ср", "чт", "пт", "сб"];
const MONTH_SHORT = ["янв","фев","мар","апр","мая","июн","июл","авг","сен","окт","ноя","дек"];
let availability = [];

async function selectService(service) {
  state.service = service;
  state.date = state.time = state.employee = null;

  document.getElementById("chosen-service").innerHTML = `
    <b>${service.name}</b>
    <span>${fmtRange(service.price_min, service.price_max, service.currency || "PLN")}${
      fmtRange(service.duration_min, service.duration_max, "мин") ? " · " + fmtRange(service.duration_min, service.duration_max, "мин") : ""}</span>`;

  document.getElementById("days-strip").innerHTML = `<div class="empty">Ищем свободное время...</div>`;
  document.getElementById("slots-list").innerHTML = "";
  goToStep("date");

  const res = await api(`/availability?service_id=${service.id}&days=21`);
  if (res.error) {
    document.getElementById("days-strip").innerHTML = `<div class="empty">${res.error}</div>`;
    return;
  }
  availability = res.days || [];
  renderDaysStrip();

  // Сразу открываем ближайший день со свободным временем: чаще всего человек
  // хочет «как можно раньше», и лишний клик тут ни к чему.
  const first = availability.find(d => d.slots.length);
  if (first) selectDay(first.date);
  else document.getElementById("slots-list").innerHTML =
    `<div class="no-slots">На ближайшие три недели свободного времени нет.<br>Позвоните нам, подберём вариант.</div>`;
}

function renderDaysStrip() {
  document.getElementById("days-strip").innerHTML = availability.map(d => {
    const date = new Date(d.date + "T00:00:00");
    const free = d.slots.length;
    return `
      <button class="day ${free ? "" : "empty-day"} ${d.date === state.date ? "selected" : ""}"
              ${free ? `onclick="selectDay('${d.date}')"` : "disabled"}>
        <small>${DAY_SHORT[d.weekday]}</small>
        <b>${date.getDate()}</b>
        <small>${MONTH_SHORT[date.getMonth()]}</small>
        <span class="free">${free ? free + " " + plural(free, "окно", "окна", "окон") : "—"}</span>
      </button>`;
  }).join("");
}

function plural(n, one, few, many) {
  const m10 = n % 10, m100 = n % 100;
  if (m10 === 1 && m100 !== 11) return one;
  if (m10 >= 2 && m10 <= 4 && (m100 < 10 || m100 >= 20)) return few;
  return many;
}

function selectDay(date) {
  state.date = date;
  state.time = null;
  renderDaysStrip();
  document.querySelector(".day.selected")?.scrollIntoView({ block: "nearest", inline: "center", behavior: "smooth" });

  const day = availability.find(d => d.date === date);
  const el = document.getElementById("slots-list");
  if (!day || !day.slots.length) { el.innerHTML = `<div class="no-slots">В этот день свободного времени нет.</div>`; return; }

  // Разбиваем по времени суток — так проще искать глазами, чем в сплошной ленте
  const periods = [
    { name: "Утро", from: 0, to: 12 * 60 },
    { name: "День", from: 12 * 60, to: 17 * 60 },
    { name: "Вечер", from: 17 * 60, to: 24 * 60 },
  ];
  const toMin = t => Number(t.slice(0, 2)) * 60 + Number(t.slice(3, 5));

  el.innerHTML = periods.map(p => {
    const slots = day.slots.filter(s => toMin(s.time) >= p.from && toMin(s.time) < p.to);
    if (!slots.length) return "";
    return `
      <div class="period">
        <div class="period-name">${p.name}</div>
        <div class="slots">
          ${slots.map(s => `
            <div class="slot" onclick='pickSlot("${s.time}", ${JSON.stringify(s.employees).replace(/'/g, "&#39;")}, this)'>
              ${s.time}
              ${s.employees.length === 1 ? `<small>${s.employees[0].name}</small>` : ""}
            </div>`).join("")}
        </div>
      </div>`;
  }).join("");
}

function pickSlot(time, employees, el) {
  document.querySelectorAll(".slot").forEach(s => s.classList.remove("selected"));
  el.classList.add("selected");
  state.time = time;

  // Если в это время свободен один мастер — выбирать не из чего, идём дальше.
  if (employees.length === 1) {
    state.employee = employees[0];
    setTimeout(() => goToStep("contact"), 300);
    return;
  }
  // Иначе даём выбрать, но с вариантом «не важно» — большинству всё равно.
  const el2 = document.getElementById("slots-list");
  el2.innerHTML = `
    <div class="period">
      <div class="period-name">Кто вас примет в ${time}?</div>
      <div class="card" onclick='chooseMaster(${JSON.stringify(employees[0]).replace(/'/g, "&#39;")})'>
        <h3>Не важно</h3><p>Запишем к свободному мастеру</p>
      </div>
      ${employees.map(e => `
        <div class="card" onclick='chooseMaster(${JSON.stringify(e).replace(/'/g, "&#39;")})'><h3>${e.name}</h3></div>
      `).join("")}
    </div>
    <button class="back" onclick="selectDay('${state.date}')">← Назад ко времени</button>`;
}

function chooseMaster(employee) {
  state.employee = employee;
  goToStep("contact");
}

async function submitBooking() {
  const client_name = document.getElementById("client-name").value.trim();
  const client_phone = document.getElementById("client-phone").value.trim();
  if (!client_name || !client_phone) { alert("Заполни имя и телефон"); return; }

  const res = await fetch(`${API_BASE}/book`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      service_id: state.service.id,
      employee_id: state.employee.id,
      date: state.date,
      time: state.time,
      client_name, client_phone,
    }),
  });
  const result = await res.json();
  if (result.ok) {
    goToStep("success");
  } else {
    alert(result.error || "Не получилось создать запись, попробуй другое время");
  }
}

updateProgress("service");
loadServices();
</script>
</body>
</html>
