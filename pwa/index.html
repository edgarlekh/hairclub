// ---------- СВОДКА (отчёты, retention, реактивация) ----------
const SUM_PERIODS = [
  { key: "month", label: "Месяц", days: 30 },
  { key: "quarter", label: "3 месяца", days: 91 },
  { key: "half", label: "Полгода", days: 182 },
  { key: "year", label: "Год", days: 365 },
];
let sumPeriod = "half";
let dormantMonths = 6;
let birthdayMonth = new Date().getMonth() + 1;

function periodFrom(days) {
  return todayStr(new Date(Date.now() - days * 864e5));
}
function money(n) {
  return Math.round(n || 0).toLocaleString("ru-RU");
}

async function renderSummary() {
  document.getElementById("fab").style.display = "none";
  document.getElementById("content").innerHTML = `<div class="empty">Загрузка...</div>`;

  const period = SUM_PERIODS.find(p => p.key === sumPeriod);
  const [data, dormant, birthdays] = await Promise.all([
    api(`/analytics?from=${periodFrom(period.days)}`),
    api(`/clients/dormant?months=${dormantMonths}`),
    api(`/clients/birthdays?month=${birthdayMonth}`),
  ]);

  const maxRev = Math.max(1, ...data.byMaster.map(m => m.revenue));
  const maxService = Math.max(1, ...(data.byService || []).map(s => s.revenue));

  // Часы показываем сплошным диапазоном, включая пустые — иначе провалы не видно
  const hours = (data.byHour || []);
  const hFrom = hours.length ? Math.min(...hours.map(h => h.hour)) : 9;
  const hTo = hours.length ? Math.max(...hours.map(h => h.hour)) : 20;
  const hourSeries = [];
  for (let h = hFrom; h <= hTo; h++) {
    hourSeries.push({ hour: h, visits: (hours.find(x => x.hour === h) || {}).visits || 0 });
  }
  const maxHour = Math.max(1, ...hourSeries.map(h => h.visits));
  const quietHour = maxHour * 0.35; // тихими считаем всё ниже трети от пика

  const WD = ["Вс", "Пн", "Вт", "Ср", "Чт", "Пт", "Сб"];
  const weekdaySeries = [1, 2, 3, 4, 5, 6, 0].map(n => {
    const row = (data.byWeekday || []).find(w => w.weekday === n) || {};
    return { name: WD[n], visits: row.visits || 0, revenue: row.revenue || 0 };
  });
  const maxWeekday = Math.max(1, ...weekdaySeries.map(w => w.visits));
  const quietDay = maxWeekday * 0.35;
  const maxDay = Math.max(1, ...data.byDay.map(d => d.revenue));
  // Для длинных периодов дневные столбики сливаются — группируем по неделям
  const series = period.days > 40 ? groupByWeek(data.byDay) : data.byDay.map(d => ({ label: d.day.slice(8), revenue: d.revenue, day: d.day }));
  const maxSeries = Math.max(1, ...series.map(s => s.revenue));
  const monthNames = ["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];

  document.getElementById("content").innerHTML = `
    <div class="seg">
      ${SUM_PERIODS.map(p => `<button class="${p.key === sumPeriod ? "active" : ""}" onclick="setSumPeriod('${p.key}')">${p.label}</button>`).join("")}
    </div>

    <div class="sum-cards">
      <div class="sum-card accent"><b>${money(data.totals.revenue)}</b><span>PLN выручка</span></div>
      <div class="sum-card"><b>${data.totals.visits}</b><span>визитов</span></div>
      <div class="sum-card"><b>${data.totals.active_clients}</b><span>клиентов</span></div>
    </div>
    <div class="sum-cards">
      <div class="sum-card"><b>${data.retention.returning_clients || 0}</b><span>вернулись</span></div>
      <div class="sum-card"><b>${data.retention.new_clients || 0}</b><span>новых</span></div>
      <div class="sum-card"><b>${data.totals.active_clients ? Math.round((data.retention.returning_clients || 0) / data.totals.active_clients * 100) : 0}%</b><span>доля вернувшихся</span></div>
    </div>

    <h3 class="sum-title">Кто сколько заработал</h3>
    ${data.byMaster.length ? data.byMaster.map(m => `
      <div class="bar-row">
        <div class="who"><span class="dot" style="background:${m.color || '#b8824f'}"></span>${m.name}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${Math.max(4, m.revenue / maxRev * 100)}%;background:${m.color || '#b8824f'}"></div>
          <span class="bar-val">${money(m.revenue)}</span>
        </div>
      </div>
      <div class="bar-sub" style="margin:-4px 0 10px 102px">${m.visits} визитов · средний чек ${money(m.revenue / (m.visits || 1))}</div>
    `).join("") : `<p class="empty">За период нет данных.</p>`}

    <h3 class="sum-title">Выручка по ${period.days > 40 ? "неделям" : "дням"}</h3>
    <div class="spark">
      ${series.map(s => `<div class="col ${s.day === todayStr() ? "today" : ""}" title="${s.label}: ${money(s.revenue)} PLN">
        <div class="fill" style="height:${s.revenue / maxSeries * 100}%"></div></div>`).join("")}
    </div>
    ${series.length ? `<div class="spark-labels"><span>${series[0].label}</span><span>${series[series.length-1].label}</span></div>` : ""}

    <h3 class="sum-title">Что приносит деньги</h3>
    ${(data.byService || []).length ? data.byService.slice(0, 8).map(s => `
      <div class="bar-row">
        <div class="who" style="width:140px" title="${s.name}">${s.name}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${Math.max(4, s.revenue / maxService * 100)}%;background:var(--gold-2)"></div>
          <span class="bar-val">${money(s.revenue)}</span>
        </div>
      </div>
      <div class="bar-sub" style="margin:-4px 0 10px 150px">${s.visits} раз · средний чек ${money(s.revenue / (s.visits || 1))}</div>
    `).join("") : `<p class="empty">За период нет данных.</p>`}

    <h3 class="sum-title">Загруженность по часам</h3>
    <div class="load-grid">
      ${hourSeries.map(h => `<div class="b ${h.visits <= quietHour ? "quiet" : ""}" title="${h.hour}:00 — ${h.visits} визитов">
        <i style="height:${h.visits / maxHour * 100}%"></i></div>`).join("")}
    </div>
    <div class="load-labels">${hourSeries.map(h => `<span>${h.hour % 3 === 0 ? h.hour : ""}</span>`).join("")}</div>
    <p class="hint">Серым — самые тихие часы. Под них удобно ставить акции.</p>

    <h3 class="sum-title">Загруженность по дням недели</h3>
    <div class="load-grid">
      ${weekdaySeries.map(w => `<div class="b ${w.visits <= quietDay ? "quiet" : ""}" title="${w.name}: ${w.visits} визитов, ${money(w.revenue)} PLN">
        <i style="height:${w.visits / maxWeekday * 100}%"></i></div>`).join("")}
    </div>
    <div class="load-labels">${weekdaySeries.map(w => `<span>${w.name}</span>`).join("")}</div>

    <h3 class="sum-title">Давно не были — можно позвать</h3>
    <div class="seg">
      ${[3,6,12].map(m => `<button class="${m === dormantMonths ? "active" : ""}" onclick="setDormant(${m})">${m} мес+</button>`).join("")}
    </div>
    ${dormant.length ? dormant.slice(0, 40).map(c => `
      <div class="lead" onclick="openClientById(${c.id})">
        <div>
          <div class="name">${c.full_name || "без имени"}</div>
          <div class="meta">был ${c.last_visit.slice(0,10)} · всего ${c.visits}</div>
        </div>
        ${c.phone ? `<a class="call" href="tel:${c.phone}" onclick="event.stopPropagation()">${c.phone}</a>` : ""}
      </div>
    `).join("") : `<p class="empty">Таких клиентов нет — все заходили недавно 👍</p>`}
    ${dormant.length > 40 ? `<p class="hint">Показаны первые 40 из ${dormant.length}.</p>` : ""}

    <h3 class="sum-title">Дни рождения</h3>
    <div class="seg">
      <button class="cal-nav" onclick="setBirthdayMonth(${birthdayMonth === 1 ? 12 : birthdayMonth - 1})" style="border:none;background:none;color:var(--gold-mid)">‹</button>
      <button class="active" style="pointer-events:none">${monthNames[birthdayMonth - 1]}</button>
      <button class="cal-nav" onclick="setBirthdayMonth(${birthdayMonth === 12 ? 1 : birthdayMonth + 1})" style="border:none;background:none;color:var(--gold-mid)">›</button>
    </div>
    ${birthdays.length ? birthdays.map(c => `
      <div class="lead" onclick="openClientById(${c.id})">
        <div>
          <div class="name">${c.full_name || "без имени"}</div>
          <div class="meta">🎂 ${Number(c.birthday.slice(8,10))} ${monthNames[birthdayMonth - 1].toLowerCase()}</div>
        </div>

      </div>
    `).join("") : `<p class="empty">В этом месяце именинников нет.</p>`}
  `;
}

// Группировка дневных сумм в недельные для длинных периодов
function groupByWeek(byDay) {
  const weeks = [];
  for (const d of byDay) {
    const monday = new Date(d.day + "T00:00:00");
    monday.setDate(monday.getDate() - ((monday.getDay() + 6) % 7)); // к понедельнику
    const key = todayStr(monday);
    let w = weeks.find(x => x.key === key);
    if (!w) { w = { key, label: key.slice(5), revenue: 0, day: key }; weeks.push(w); }
    w.revenue += d.revenue;
  }
  return weeks;
}

  content.innerHTML = items.map(k => `

      <h3>${k.topic}</h3>
      <p>${k.content}</p>
    </div>
  `).join("") || `<div class="empty">База знаний пуста.</div>`;
}

function openKnowledgeForm() {
  openModal(`
    <h2>Добавить в базу знаний</h2>
    <label>Тема (например "Уход после процедуры")</label>
    <input id="k_topic">
    <label>Содержание</label>
    <textarea id="k_content" rows="5"></textarea>
    <button class="btn-primary" onclick="saveKnowledge()">Сохранить</button>
  `);
}

async function saveKnowledge() {
  await api("/knowledge", {
    method: "POST",
    body: JSON.stringify({
      topic: document.getElementById("k_topic").value,
      content: document.getElementById("k_content").value,
    }),
  });
  closeModal();
  renderKnowledge();
}

// ---------- ДИАЛОГИ ----------
async function renderConversations() {
  document.getElementById("fab").style.display = "none";
  const convs = await api("/conversations");
  const content = document.getElementById("content");
  if (!convs.length) {
    content.innerHTML = `<div class="empty">Пока нет диалогов.</div>`;
    return;
  }
  content.innerHTML = convs.map(c => `
    <div class="card conv-item" onclick="openConversation(${c.id})">
      <div>
        <h3>Клиент ${c.client_channel_id}</h3>
        <p>${(c.last_message || "").slice(0, 60)}</p>
      </div>
      <span class="badge ${c.status === 'escalated' ? 'escalated' : ''}">${
        c.status === 'escalated' ? 'Нужно внимание' : c.status === 'owner_active' ? 'Ты ведёшь' : 'Агент отвечает'
      }</span>
    </div>
  `).join("");
}

async function openConversation(id) {
  const messages = await api(`/conversations/${id}/messages`);
  openModal(`
    <h2>Диалог</h2>
    <div style="display:flex; flex-direction:column; max-height:50vh; overflow-y:auto; margin-bottom:12px;">
      ${messages.map(m => `<div class="msg ${m.sender}">${m.content}</div>`).join("")}
    </div>
    <textarea id="owner_msg" rows="2" placeholder="Написать клиенту от своего имени..."></textarea>
    <button class="btn-primary" onclick="sendOwnerMessage(${id})">Отправить и перехватить диалог</button>
    <button class="btn-secondary" onclick="resumeAgent(${id})">Вернуть диалог агенту</button>
  `);
}

async function sendOwnerMessage(convId) {
  const content = document.getElementById("owner_msg").value;
  if (!content.trim()) return;
  await api(`/conversations/${convId}/messages`, { method: "POST", body: JSON.stringify({ content }) });
  closeModal();
  renderConversations();
}

async function resumeAgent(convId) {
  await api(`/conversations/${convId}/resume-agent`, { method: "POST" });
  closeModal();
  renderConversations();
}

// ---------- ПРОФИЛЬ / ТОН ОБЩЕНИЯ ----------
async function renderProfile() {
  document.getElementById("fab").style.display = "none";
  const salon = await api("/salon");
  document.getElementById("content").innerHTML = `
    <div class="card">
      <label>Название салона</label>
      <input id="p_name" value="${salon.name || ""}">
      <label>Адрес</label>
      <input id="p_address" value="${salon.address || ""}">
      <label>Часы работы</label>
      <input id="p_hours" value="${salon.working_hours || ""}">
      <label>Тон общения AI-агента</label>
      <textarea id="p_tone" rows="3">${salon.tone_of_voice || ""}</textarea>
      <p style="margin-top:6px; font-size:12px;">Например: "дружелюбный и тёплый" или "строгий и деловой" — агент будет придерживаться этого стиля во всех диалогах.</p>

      <label>Использование смайликов</label>
      <select id="p_emoji">
        <option value="none" ${salon.emoji_usage === "none" ? "selected" : ""}>Не использовать вообще</option>
        <option value="minimal" ${salon.emoji_usage === "minimal" || !salon.emoji_usage ? "selected" : ""}>Минимально (по умолчанию)</option>
        <option value="moderate" ${salon.emoji_usage === "moderate" ? "selected" : ""}>Умеренно</option>
      </select>

      <label>Запрещённые слова и фразы (через запятую)</label>
      <textarea id="p_banned" rows="3" placeholder="например: скидка, дешево, недорого">${salon.banned_words || ""}</textarea>
      <p style="margin-top:6px; font-size:12px;">Агент никогда не будет использовать эти слова в переписке с клиентами.</p>

      <button class="btn-primary" onclick="saveProfile()">Сохранить</button>
      <button class="btn-secondary" onclick="logout()">Выйти из панели</button>
    </div>
  `;
}

async function saveProfile() {
  await api("/salon", {
    method: "PUT",
    body: JSON.stringify({
      name: document.getElementById("p_name").value,
      address: document.getElementById("p_address").value,
      working_hours: document.getElementById("p_hours").value,
      tone_of_voice: document.getElementById("p_tone").value,
      emoji_usage: document.getElementById("p_emoji").value,
      banned_words: document.getElementById("p_banned").value,
    }),
  });
  alert("Сохранено!");
}

function render() {
  document.getElementById("content").innerHTML = `<div class="empty">Загрузка...</div>`;
  const renderers = {
    calendar: renderCalendar,
    summary: renderSummary,
    services: renderServices,
    employees: renderEmployees,
    clients: renderClients,
    rules: renderRules,
    knowledge: renderKnowledge,
    conversations: renderConversations,
    profile: renderProfile,
  };
  renderers[currentTab]();
}

// ---------- ВХОД (защита панели токеном) ----------
function showLogin(errorMsg) {
  document.querySelector("nav").style.display = "none";
  document.getElementById("fab").style.display = "none";
  document.getElementById("content").innerHTML = `
    <div class="card" style="max-width:360px;margin:40px auto;">
      <h3 style="text-align:center">Вход в панель</h3>
      <p style="text-align:center">Введите токен доступа владельца.</p>
      ${errorMsg ? `<p style="color:var(--terracotta);text-align:center">${errorMsg}</p>` : ""}
      <label>Токен доступа</label>
      <input id="login_token" type="password" placeholder="Токен">
      <button class="btn-primary" onclick="doLogin()">Войти</button>
    </div>`;
  const inp = document.getElementById("login_token");
  inp.addEventListener("keydown", (e) => { if (e.key === "Enter") doLogin(); });
  inp.focus();
}

async function doLogin() {
  const token = document.getElementById("login_token").value.trim();
  if (!token) return;
  ADMIN_TOKEN = token;
  const res = await fetch(`${API_BASE}/salon`, { headers: { "X-Admin-Token": token } });
  if (res.ok) {
    localStorage.setItem("hc_admin_token", token);
    startApp();
  } else {
    ADMIN_TOKEN = "";
    showLogin("Неверный токен. Попробуйте ещё раз.");
  }
}

function logout() {
  localStorage.removeItem("hc_admin_token");
  ADMIN_TOKEN = "";
  location.reload();
}

function startApp() {
  document.querySelector("nav").style.display = "flex";
  render();
}

async function boot() {
  if (!ADMIN_TOKEN) { showLogin(); return; }
  const res = await fetch(`${API_BASE}/salon`, { headers: { "X-Admin-Token": ADMIN_TOKEN } });
  if (res.ok) startApp();
  else showLogin("Сессия истекла. Войдите снова.");
}

// Если панель почему-то не поднялась (застрявший кэш, оборванная загрузка),
// владелец не должен смотреть в пустой экран, не понимая, что делать.
function showRecovery(details) {
  const nav = document.querySelector("nav");
  if (nav) nav.style.display = "none";
  const fab = document.getElementById("fab");
  if (fab) fab.style.display = "none";
  const box = document.getElementById("content");
  if (!box) return;
  box.innerHTML = `
    <div class="card" style="max-width:380px;margin:40px auto;text-align:center">
      <h3>Панель не загрузилась</h3>
      <p>Обычно помогает обновление: сбросим сохранённую копию и перезагрузим страницу.</p>
      <button class="btn-primary" onclick="hardReload()">Обновить панель</button>
      <p style="font-size:11px;color:var(--muted);margin-top:10px">${details || ""}</p>
    </div>`;
}

async function hardReload() {
  try {
    for (const r of await navigator.serviceWorker.getRegistrations()) await r.unregister();
    for (const k of await caches.keys()) await caches.delete(k);
  } catch {}
  location.reload();
}

boot()
  .then(() => { window.__appBooted = true; })
  .catch((e) => showRecovery(e && e.message));

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}
</script>

<!--
  Страховка отдельным тегом: если основной скрипт вообще не выполнился
  (застрявший кэш, оборванная загрузка), внутри него ничего не сработает —
  включая обработчики ошибок. Этот блок независим и покажет, что делать,
  вместо пустого экрана. Такое уже случалось после обновления панели.
-->
<script>
setTimeout(function () {
  if (window.__appBooted) return;
  if (document.getElementById("login_token")) return;   // ждём ввода токена — это норма
  var box = document.getElementById("content");
  if (!box || box.children.length) return;              // что-то отрисовалось, значит живо

  var nav = document.querySelector("nav");
  if (nav) nav.style.display = "none";
  box.innerHTML =
    '<div class="card" style="max-width:380px;margin:40px auto;text-align:center">' +
    '<h3>Панель не загрузилась</h3>' +
    '<p>Похоже, браузер держит устаревшую копию. Сбросим её и перезагрузим.</p>' +
    '<button class="btn-primary" id="recover_btn">Обновить панель</button></div>';

  document.getElementById("recover_btn").onclick = function () {
    var done = function () { location.reload(); };
    if (!("serviceWorker" in navigator)) return done();
    navigator.serviceWorker.getRegistrations()
      .then(function (rs) { return Promise.all(rs.map(function (r) { return r.unregister(); })); })
      .then(function () { return caches.keys(); })
      .then(function (ks) { return Promise.all(ks.map(function (k) { return caches.delete(k); })); })
      .then(done, done);
  };
}, 4000);
</script>
