<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAIR CLUB — Панель управления</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#c79a63">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Poppins:wght@300;400;500;600;700&family=Alex+Brush&display=swap" rel="stylesheet">
<style>
  :root {
    --gold-1: #9c6b3e;
    --gold-2: #d9ad78;
    --gradient: linear-gradient(135deg, var(--gold-1), var(--gold-2));
    --gold-mid: #b8824f;
    --sage: #7c9473;
    --sage-light: #eaf0e6;
    --terracotta: #c0392b;
    --terracotta-light: #fbe3e0;
    --bg: #fdfbf7;
    --card: #ffffff;
    --text: #2b2420;
    --muted: #8a8072;
    --border: #ece4d8;
    --font-heading: "Cormorant Garamond", Georgia, serif;
    --font-body: "Poppins", -apple-system, "Segoe UI", Roboto, sans-serif;
    --font-script: "Alex Brush", cursive;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: var(--font-body);
    background: var(--bg); color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  header {
    background: var(--gradient); padding: 22px 20px; color: white;
    display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 10;
    box-shadow: 0 2px 16px rgba(156, 107, 62, 0.25);
  }
  /* Логотип вытянут по горизонтали (примерно 1,38:1) — высоту задаём, ширину пускаем свободно */
  .brand-mark { height: 60px; width: auto; flex-shrink: 0; }
  .brand-text { display: flex; flex-direction: column; line-height: 1.1; }
  header h1 {
    font-family: var(--font-body); font-weight: 300; letter-spacing: 2px;
    font-size: 19px; margin: 0; text-transform: uppercase;
  }
  header .subtitle {
    font-family: var(--font-heading); font-style: italic; font-weight: 500;
    font-size: 13px; opacity: 0.92; margin-top: 2px;
  }
  nav {
    display: flex; overflow-x: auto; background: white;
    border-bottom: 1px solid var(--border); position: sticky; top: 74px; z-index: 9;
  }
  nav button {
    flex: 1; min-width: 90px; padding: 14px 8px; border: none; background: none;
    font-family: var(--font-body); font-size: 12.5px; letter-spacing: 0.2px;
    color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }
  nav button.active { color: var(--gold-1); border-bottom-color: var(--gold-2); font-weight: 600; }
  main { padding: 16px; max-width: 720px; margin: 0 auto; }
  .card {
    background: var(--card); border-radius: 14px; padding: 16px;
    margin-bottom: 12px; border: 1px solid var(--border);
    box-shadow: 0 2px 10px rgba(156, 107, 62, 0.06);
    transition: box-shadow 0.15s, transform 0.15s;
  }
  .card:hover { box-shadow: 0 4px 16px rgba(156, 107, 62, 0.12); }
  .card h3 { margin: 0 0 6px; font-family: var(--font-heading); font-weight: 600; font-size: 18px; }
  .card p { margin: 0; font-size: 13px; color: var(--muted); }
  .price { font-weight: 600; color: var(--gold-mid); }
  .fab {
    position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px;
    border-radius: 50%; background: var(--gradient); color: white; border: none;
    font-size: 26px; box-shadow: 0 4px 16px rgba(156, 107, 62, 0.4); cursor: pointer;
    display: flex; align-items: center; justify-content: center; line-height: 1;
  }
  .modal-bg {
    position: fixed; inset: 0; background: rgba(43, 36, 32, 0.45); display: none;
    align-items: flex-end; justify-content: center; z-index: 20;
    backdrop-filter: blur(2px);
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: white; width: 100%; max-width: 720px; border-radius: 20px 20px 0 0;
    padding: 22px; max-height: 85vh; overflow-y: auto;
  }
  .modal h2 { margin-top: 0; font-family: var(--font-heading); font-weight: 600; font-size: 21px; color: var(--gold-1); }
  label { display: block; font-size: 12px; color: var(--muted); margin: 10px 0 4px; }
  input, textarea, select {
    width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px;
    font-size: 14px; font-family: inherit; background: var(--bg);
  }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--gold-2); background: white; }
  /* Галочки и радио не должны растягиваться на всю ширину, как текстовые поля */
  input[type="checkbox"], input[type="radio"] {
    width: 18px; height: 18px; padding: 0; accent-color: var(--gold-1); cursor: pointer; flex: none;
  }
  /* Понятный переключатель-строка: галочка + название + пояснение, всё в рамке */
  .check { display: flex; align-items: flex-start; gap: 11px; padding: 12px 13px; margin: 12px 0;
           border: 1px solid var(--border); border-radius: 10px; cursor: pointer; background: white; }
  .check:hover { border-color: var(--gold-2); }
  .check input { margin-top: 1px; }
  .check .t { font-size: 14px; color: var(--text); font-weight: 500; }
  .check .t small { display: block; font-weight: 400; font-size: 12px; color: var(--muted); margin-top: 2px; }
  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }
  .btn-primary {
    width: 100%; padding: 13px; background: var(--gradient); color: white; border: none;
    border-radius: 10px; font-size: 15px; font-weight: 600; margin-top: 16px; cursor: pointer;
    letter-spacing: 0.3px;
  }
  .btn-secondary {
    width: 100%; padding: 12px; background: none; color: var(--muted); border: 1px solid var(--border);
    border-radius: 10px; font-size: 14px; margin-top: 8px; cursor: pointer;
  }
  .conv-item { display: flex; justify-content: space-between; align-items: center; cursor: pointer; gap: 10px; }
  .badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: var(--sage-light); color: var(--sage); white-space: nowrap; }
  .badge.escalated { background: var(--terracotta-light); color: var(--terracotta); }
  .msg { padding: 8px 12px; border-radius: 10px; margin-bottom: 6px; font-size: 13px; max-width: 80%; }
  .msg.client { background: #f1efe9; align-self: flex-start; }
  .msg.agent { background: #f4e8d6; align-self: flex-end; margin-left: auto; }
  .msg.owner { background: var(--sage-light); align-self: flex-end; margin-left: auto; }
  .empty { text-align: center; color: var(--muted); padding: 40px 0; font-size: 14px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .chip { font-size: 11px; padding: 4px 10px; border-radius: 20px; background: var(--bg); border: 1px solid var(--border); color: var(--text); }
  .chip-select { display: flex; align-items: center; gap: 8px; padding: 9px 4px; border-bottom: 1px solid var(--border); font-size: 14px; }
  .chip-select:last-child { border-bottom: none; }
  .chip-select input { width: auto; }
  .photo-row { display: flex; gap: 10px; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .photo-row img { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; background: var(--bg); flex-shrink: 0; }
  .photo-row .photo-info { flex: 1; font-size: 12px; color: var(--muted); }
  .photo-row .photo-del { background: none; border: none; color: var(--terracotta); font-size: 18px; cursor: pointer; padding: 4px 8px; }
  .link-btn { background: none; border: none; color: var(--gold-mid); font-size: 13px; font-weight: 600; cursor: pointer; padding: 0; margin-top: 10px; }
  .sched { display: flex; flex-direction: column; gap: 6px; margin-bottom: 4px; }
  .sched-row { display: flex; align-items: center; gap: 8px; }
  .sched-row.off { opacity: .45; }
  .sched-day { display: flex; align-items: center; gap: 6px; width: 62px; flex-shrink: 0; margin: 0; }
  .sched-day span { font-size: 13px; font-weight: 600; }
  .sched-row select { flex: 1; min-width: 0; margin: 0; }
  .sched-dash { color: var(--muted); }

  .cat-bar { display: flex; justify-content: space-between; align-items: center; gap: 12px;
             font-size: 13px; color: var(--muted); margin: 0 0 10px; }
  .cat-bar .link-btn { margin-top: 0; }
  .group-head { font-family: var(--font-heading); font-size: 15px; font-weight: 600; color: var(--gold-1);
                margin: 18px 0 8px; display: flex; align-items: baseline; gap: 8px; }
  .group-head span { font-family: var(--font-body); font-size: 12px; font-weight: 400; color: var(--muted); }
  .card-off { opacity: .55; }
  .hint { font-size: 12px; color: var(--muted); margin: 4px 0 10px; }

  /* ---------- ФОРМА ЗАПИСИ ---------- */
  .chosen-line { background: var(--bg-soft); border: 1px solid var(--border); border-radius: 10px;
                 padding: 11px 12px; margin-bottom: 12px; font-weight: 600; font-size: 14px;
                 display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .chosen-line .link-btn { margin: 0; font-weight: 600; }
  .pick-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
  .pick-list button { text-align: left; background: white; border: 1px solid var(--border);
                      border-radius: 10px; padding: 10px 12px; cursor: pointer; font-family: inherit;
                      font-size: 14px; display: flex; justify-content: space-between; gap: 10px; }
  .pick-list button:hover { border-color: var(--gold-2); background: var(--bg-soft); }
  .pick-list button span { color: var(--muted); font-size: 13px; }
  .quick-days { display: flex; gap: 6px; margin: 8px 0 4px; flex-wrap: wrap; }
  .quick-days button { background: white; border: 1px solid var(--border); border-radius: 999px;
                       padding: 6px 12px; font-size: 13px; font-family: inherit; cursor: pointer; }
  .quick-days button:hover { border-color: var(--gold-2); color: var(--gold-mid); }
  .when-preview { font-size: 14px; font-weight: 600; color: var(--gold-mid); margin: 6px 0 14px; }
  /* Кнопки сохранения всегда на виду — форма длинная и уезжает за экран */
  .form-actions { position: sticky; bottom: -18px; display: flex; gap: 8px; margin-top: 18px;
                  padding: 12px 0; background: linear-gradient(transparent, white 22%); }
  .form-actions button { margin: 0; }
  .form-actions .btn-secondary { flex: 0 0 34%; }

  /* Переключатель «весь день / часть дня» — вместо непонятной галочки */
  .seg { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 12px; }
  .seg button { flex: 1; background: white; border: none; padding: 10px; font-family: inherit; font-size: 14px;
                cursor: pointer; color: var(--muted); border-right: 1px solid var(--border); }
  .seg button:last-child { border-right: none; }
  .seg button.active { background: var(--gradient); color: white; font-weight: 600; }
  .timeoff-item { display: flex; justify-content: space-between; align-items: center; gap: 10px;
                  padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 6px; }
  .timeoff-item b { display: block; font-size: 14px; }
  .timeoff-item span { font-size: 12px; color: var(--muted); }

  .visit-thumbs { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .visit-thumbs img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; background: var(--bg); cursor: zoom-in; }

  /* Полноэкранный просмотр фото */
  .lightbox { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.92);
              align-items: center; justify-content: center; touch-action: pan-y; }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
  .lb-close { position: absolute; top: 10px; right: 14px; z-index: 2; background: rgba(0,0,0,.45); border: none;
              color: #fff; font-size: 30px; line-height: 1; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; }
  .lb-nav { position: absolute; top: 50%; transform: translateY(-50%); z-index: 2; background: rgba(0,0,0,.45);
            border: none; color: #fff; font-size: 34px; line-height: 1; width: 46px; height: 46px;
            border-radius: 50%; cursor: pointer; }
  .lb-prev { left: 10px; } .lb-next { right: 10px; }
  .lb-nav[hidden] { display: none; }
  .lb-bar { position: absolute; bottom: 0; left: 0; right: 0; padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
            display: flex; justify-content: space-between; gap: 12px; align-items: center;
            background: linear-gradient(transparent, rgba(0,0,0,.65)); color: #fff; font-size: 13px; pointer-events: none; }
  #lb_counter { opacity: .75; white-space: nowrap; }

  /* ---------- КАЛЕНДАРЬ ЗАПИСЕЙ ---------- */
  .cal-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .cal-bar .spacer { flex: 1; }
  .cal-nav { background: white; border: 1px solid var(--border); border-radius: 10px; width: 34px; height: 34px;
             font-size: 17px; cursor: pointer; color: var(--gold-mid); flex: none; }
  .cal-nav:hover { border-color: var(--gold-2); }
  .cal-today { background: white; border: 1px solid var(--border); border-radius: 10px; padding: 0 12px; height: 34px;
               cursor: pointer; font-size: 13px; font-weight: 600; color: var(--gold-mid); }
  #cal_date { border: 1px solid var(--border); border-radius: 10px; height: 34px; padding: 0 8px; font-size: 13px;
              font-family: inherit; background: white; margin: 0; }
  .cal-title { font-family: var(--font-heading); font-weight: 600; font-size: 15px; }
  .cal-title span { color: var(--muted); font-weight: 400; font-size: 13px; }

  .cal-stats { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .cal-stat { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 8px 12px; flex: 1; min-width: 90px; }
  .cal-stat b { display: block; font-size: 19px; font-family: var(--font-heading); color: var(--gold-1); }
  .cal-stat span { font-size: 11px; color: var(--muted); }

  /* Сетка: слева колонка времени, дальше по колонке на мастера */
  .cal-wrap { background: white; border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .cal-scroll { overflow-x: auto; overflow-y: hidden; }
  .cal-grid { display: grid; position: relative; min-width: max-content; }
  .cal-head { position: sticky; top: 0; z-index: 3; background: var(--bg-soft); border-bottom: 1px solid var(--border);
              padding: 8px 6px; text-align: center; font-size: 12px; font-weight: 600; }
  .cal-head small { display: block; font-weight: 400; color: var(--muted); font-size: 10px; }
  .cal-head.corner { position: sticky; left: 0; z-index: 4; }
  .cal-time { position: sticky; left: 0; z-index: 2; background: white; border-right: 1px solid var(--border);
              font-size: 10px; color: var(--muted); text-align: right; padding-right: 6px; }
  .cal-col { position: relative; border-right: 1px solid var(--border); }
  .cal-col:last-child { border-right: none; }
  .cal-hour { border-bottom: 1px solid var(--border); }
  .cal-half { border-bottom: 1px dashed rgba(0,0,0,.05); }
  .cal-off { background: repeating-linear-gradient(45deg, rgba(0,0,0,.03) 0 6px, transparent 6px 12px); }

  .cal-ev { position: absolute; left: 3px; right: 3px; border-radius: 8px; padding: 4px 6px; overflow: hidden;
            font-size: 11px; line-height: 1.25; cursor: pointer; color: #fff; z-index: 1;
            background: var(--gradient); box-shadow: 0 1px 4px rgba(0,0,0,.15); }
  .cal-ev:hover { filter: brightness(1.06); }
  .cal-ev b { display: block; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cal-ev i { font-style: normal; opacity: .85; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cal-ev.cancelled { text-decoration: line-through; }
  .cal-ev.off { background: rgba(90,80,70,.5) !important; font-size: 10px; }
  .cal-col { cursor: copy; }              /* намёк, что по пустому месту можно кликнуть */
  .cal-now { position: absolute; left: 0; right: 0; height: 2px; background: var(--terracotta); z-index: 2; pointer-events: none; }
  .cal-now::before { content: ""; position: absolute; left: -3px; top: -3px; width: 8px; height: 8px;
                     border-radius: 50%; background: var(--terracotta); }

  /* Переключатель мастеров: «Все» + по одному на каждого, с цветной точкой */
  .cal-picker { display: flex; gap: 6px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 2px; }
  .cal-picker button { flex: none; display: inline-flex; align-items: center; gap: 6px; border: 1px solid var(--border);
                       background: white; border-radius: 999px; padding: 7px 13px; font-size: 13px; font-family: inherit; cursor: pointer; }
  .cal-picker button.active { background: var(--gradient); color: white; border-color: transparent; }
  .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; flex: none; }
  .cal-head .dot { margin-right: 5px; vertical-align: middle; }
  @media (max-width: 640px) {
    .cal-stat b { font-size: 17px; }
  }

  /* Палитра выбора цвета мастера */
  .color-grid { display: flex; flex-wrap: wrap; gap: 8px; margin: 4px 0 12px; }
  .color-swatch { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
  .color-swatch.active { border-color: var(--text); box-shadow: 0 0 0 2px white inset; }

  /* ---------- СВОДКА ---------- */
  .seg { display: inline-flex; background: var(--bg-soft); border: 1px solid var(--border);
         border-radius: 999px; padding: 3px; gap: 2px; margin-bottom: 14px; flex-wrap: wrap; }
  .seg button { border: none; background: none; border-radius: 999px; padding: 7px 14px;
                font-size: 13px; font-family: inherit; cursor: pointer; color: var(--muted); }
  .seg button.active { background: white; color: var(--gold-1); font-weight: 600; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .sum-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 8px; }
  .sum-card { background: white; border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
  .sum-card b { display: block; font-family: var(--font-heading); font-size: 24px; color: var(--gold-1); line-height: 1.1; }
  .sum-card span { font-size: 12px; color: var(--muted); }
  .sum-card.accent { background: var(--gradient); border-color: transparent; }
  .sum-card.accent b, .sum-card.accent span { color: white; }
  h3.sum-title { font-family: var(--font-heading); font-size: 16px; margin: 24px 0 10px; font-weight: 600; }

  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .bar-row .who { width: 92px; flex: none; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .bar-track { flex: 1; background: var(--bg-soft); border-radius: 7px; height: 26px; position: relative; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 7px; min-width: 2px; }
  .bar-val { position: absolute; right: 8px; top: 0; line-height: 26px; font-size: 12px; font-weight: 600; color: var(--text); }
  .bar-sub { font-size: 11px; color: var(--muted); }

  .spark { display: flex; align-items: flex-end; gap: 2px; height: 90px; padding: 8px 0 4px;
           border-bottom: 1px solid var(--border); overflow-x: auto; }
  .spark .col { flex: 1; min-width: 6px; display: flex; flex-direction: column; justify-content: flex-end; height: 100%; }
  .spark .col .fill { background: var(--gold-2); border-radius: 3px 3px 0 0; min-height: 2px; }
  .spark .col.today .fill { background: var(--terracotta); }
  .spark-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-top: 4px; }

  .lead { display: flex; align-items: center; justify-content: space-between; gap: 10px;
          background: white; border: 1px solid var(--border); border-radius: 10px; padding: 11px 13px; margin-bottom: 7px; cursor: pointer; }
  .lead:hover { border-color: var(--gold-2); }
  .lead .name { font-weight: 600; font-size: 14px; }
  .lead .meta { font-size: 12px; color: var(--muted); }
  .lead a.call { font-size: 13px; font-weight: 600; color: var(--gold-mid); text-decoration: none; white-space: nowrap; }

  /* Формула прошлой работы — закреплена вверху карточки клиента */
  .formula-box { background: var(--bg-soft); border: 1px solid var(--gold-2); border-radius: 12px;
                 padding: 11px 13px; margin-bottom: 14px; }
  .formula-head { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--gold-mid);
                  font-weight: 700; display: flex; justify-content: space-between; gap: 10px; margin-bottom: 5px; }
  .formula-head span { text-transform: none; letter-spacing: 0; font-weight: 400; color: var(--muted); }
  .formula-body { font-size: 14px; line-height: 1.4; white-space: pre-wrap; }

  /* Загруженность по часам и дням недели */
  .load-grid { display: flex; gap: 3px; align-items: flex-end; height: 70px; }
  .load-grid .b { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; height: 100%; }
  .load-grid .b i { display: block; background: var(--gold-2); border-radius: 3px 3px 0 0; min-height: 2px; }
  .load-grid .b.quiet i { background: #cfc4b8; }
  .load-labels { display: flex; gap: 3px; margin-top: 4px; }
  .load-labels span { flex: 1; text-align: center; font-size: 10px; color: var(--muted); }

  /* Переключатель День/Неделя */
  .cal-view { display: inline-flex; background: var(--bg-soft); border: 1px solid var(--border);
              border-radius: 999px; padding: 2px; gap: 2px; }
  .cal-view button { border: none; background: none; border-radius: 999px; padding: 6px 12px;
                     font-size: 13px; font-family: inherit; cursor: pointer; color: var(--muted); }
  .cal-view button.active { background: white; color: var(--gold-1); font-weight: 600; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .cal-head.today-head { background: var(--gradient); color: white; }
  .cal-head.today-head small { color: rgba(255,255,255,.85); }

  /* Галочка «завершить» прямо на записи */
  .ev-done { position: absolute; top: 3px; right: 3px; width: 20px; height: 20px; padding: 0;
             border: none; border-radius: 6px; background: rgba(255,255,255,.28); color: #fff;
             font-size: 12px; line-height: 20px; cursor: pointer; opacity: 0; transition: opacity .12s; }
  .cal-ev:hover .ev-done { opacity: 1; }
  .ev-done:hover { background: rgba(255,255,255,.5); }
  @media (hover: none) { .ev-done { opacity: 1; } }  /* на телефоне наведения нет */

  .qc-head { background: var(--bg-soft); border-radius: 10px; padding: 11px 13px; margin-bottom: 14px; }
  .qc-head .name { font-weight: 600; font-size: 15px; }

<body>

<header>
  <img class="brand-mark" src="logo.svg" alt="Hair Club" width="122" height="60">
  <div class="brand-text">
    <div class="subtitle">Панель владельца</div>
  </div>
</header>

<nav id="tabs">
  <button data-tab="calendar" class="active">Записи</button>
  <button data-tab="services">Услуги</button>
  <button data-tab="employees">Мастера</button>
  <button data-tab="clients">Клиенты</button>
  <button data-tab="summary">Сводка</button>
  <button data-tab="rules">Правила</button>
  <button data-tab="knowledge">База знаний</button>
  <button data-tab="conversations">Диалоги</button>
  <button data-tab="profile">Профиль</button>
</nav>

<main id="content"></main>

<button class="fab" id="fab" style="display:none">+</button>

<div class="modal-bg" id="modalBg">
  <div class="modal" id="modalContent"></div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lb-close" onclick="closeLightbox(event, true)" aria-label="Закрыть">×</button>
  <button class="lb-nav lb-prev" onclick="lightboxNav(event, -1)" aria-label="Предыдущее">‹</button>
  <img id="lb_img" src="" alt="" referrerpolicy="no-referrer">
  <button class="lb-nav lb-next" onclick="lightboxNav(event, 1)" aria-label="Следующее">›</button>
  <div class="lb-bar"><span id="lb_caption"></span><span id="lb_counter"></span></div>
</div>

<script>
const API_BASE = "https://salon-agent.edgar-lekh99.workers.dev/api";
let ADMIN_TOKEN = localStorage.getItem("hc_admin_token") || ""; // вводится через экран входа, не хранится в коде

let currentTab = "calendar";

document.getElementById("tabs").addEventListener("click", (e) => {
  if (e.target.tagName !== "BUTTON") return;
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
  e.target.classList.add("active");
  currentTab = e.target.dataset.tab;
  render();
});

function openModal(html) {
  document.getElementById("modalContent").innerHTML = html;
  document.getElementById("modalBg").classList.add("open");
}
function closeModal() {
  document.getElementById("modalBg").classList.remove("open");
}
document.getElementById("modalBg").addEventListener("click", (e) => {
  if (e.target.id === "modalBg") closeModal();
});

async function api(path, options = {}) {
  const res = await fetch(`${API_BASE}${path}`, {
    headers: {
      "Content-Type": "application/json",
      "X-Admin-Token": ADMIN_TOKEN,
    },
    ...options,
  });
  return res.json();
}

// ---------- УСЛУГИ ----------
let categoriesCache = [];

// Цена и длительность хранятся диапазоном: разные мастера и разная длина волос дают разную цифру
function fmtRange(min, max, unit) {
  if (min == null && max == null) return "";
  if (min == null || max == null || Number(min) === Number(max)) return `${min ?? max} ${unit}`;
  return `${min}–${max} ${unit}`;
}

async function renderServices() {
  document.getElementById("fab").style.display = "block";
  document.getElementById("fab").onclick = () => openServiceForm();
  const [services, categories] = await Promise.all([api("/services"), api("/service-categories")]);
  categoriesCache = categories;
  const content = document.getElementById("content");
  if (!services.length) {
    content.innerHTML = `<div class="empty">Пока нет услуг. Нажми "+", чтобы добавить первую.</div>`;
    return;
  }

  // Группируем по категориям, чтобы 96 услуг не были одной простынёй
  const groups = new Map();
  for (const s of services) {
    const key = s.category_name || "Без категории";
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(s);
  }

  content.innerHTML =
    `<div class="cat-bar">
       <span>${services.length} услуг в ${groups.size} категориях</span>
       <button class="link-btn" onclick="openCategoriesManager()">Категории →</button>
     </div>` +
    [...groups.entries()].map(([cat, list]) => `
      <h3 class="group-head">${cat} <span>${list.length}</span></h3>
      ${list.map(s => `
        <div class="card ${s.active ? "" : "card-off"}" onclick='openServiceForm(${attrJson(s)})'>
          <h3>${s.name}${s.active ? "" : ` <span class="badge">скрыта</span>`}</h3>
          <p><span class="price">${fmtRange(s.price_min, s.price_max, s.currency || "PLN")}</span>${
            fmtRange(s.duration_min, s.duration_max, "мин") ? " · " + fmtRange(s.duration_min, s.duration_max, "мин") : ""
          }</p>
          ${s.description ? `<p>${s.description}</p>` : ""}
        </div>
      `).join("")}
    `).join("");
}

function openServiceForm(service = {}) {
  const isEdit = !!service.id;
  const options = categoriesCache
    .map(c => `<option value="${c.id}" ${String(c.id) === String(service.category_id) ? "selected" : ""}>${c.name}</option>`)
    .join("");
  openModal(`
    <h2>${isEdit ? "Редактировать услугу" : "Новая услуга"}</h2>
    <label>Название</label>
    <input id="f_name" value="${service.name || ""}">
    <label>Категория</label>
    <select id="f_category" onchange="onCategoryChange(this)">
      <option value="">— без категории —</option>
      ${options}
      <option value="__new__">＋ Создать новую категорию…</option>
    </select>
    <div class="row">
      <div><label>Цена от</label><input id="f_price_min" type="number" value="${service.price_min ?? ""}"></div>
      <div><label>Цена до</label><input id="f_price_max" type="number" value="${service.price_max ?? ""}"></div>
    </div>
    <div class="row">
      <div><label>Время от (мин)</label><input id="f_dur_min" type="number" value="${service.duration_min ?? ""}"></div>
      <div><label>Время до (мин)</label><input id="f_dur_max" type="number" value="${service.duration_max ?? ""}"></div>
    </div>
    <p class="hint">Если время и цена фиксированные — заполни только «от», «до» оставь пустым.</p>
    <label class="check">
      <input type="checkbox" id="f_active" ${service.active === 0 ? "" : "checked"}>
      <span class="t">Доступна для онлайн-записи
        <small>Клиенты видят эту услугу на сайте записи. Снимите галочку — останется только в панели.</small>
      </span>
    </label>
    <label>Описание (для AI-агента — что важно знать об услуге)</label>
    <textarea id="f_desc" rows="3">${service.description || ""}</textarea>
    <button class="btn-primary" onclick="saveService(${service.id || "null"})">Сохранить</button>
    ${isEdit ? `<button class="link-btn" onclick='openServicePhotos(${attrJson(service)})'>Фото примеров работ →</button>` : ""}
    ${isEdit ? `<button class="btn-secondary" onclick="deleteService(${service.id})">Удалить услугу</button>` : ""}
  `);
}

// Создание категории прямо из формы услуги — чтобы не искать, «где их взять»
async function onCategoryChange(select) {
  if (select.value !== "__new__") return;
  const name = prompt("Название новой категории:");
  if (!name || !name.trim()) { select.value = ""; return; }
  const created = await api("/service-categories", { method: "POST", body: JSON.stringify({ name: name.trim() }) });
  categoriesCache = await api("/service-categories");
  const opt = document.createElement("option");
  opt.value = created.id;
  opt.textContent = name.trim();
  select.insertBefore(opt, select.lastElementChild);
  select.value = created.id;
}

async function openCategoriesManager() {
  const categories = await api("/service-categories");
  categoriesCache = categories;
  openModal(`
    <h2>Категории услуг</h2>
    <div id="cat_list">${categories.map(c => `
      <div class="photo-row">
        <div class="photo-info" style="font-size:14px;color:var(--text)">${c.name}</div>
        <button class="photo-del" onclick="deleteCategory(${c.id})" title="Удалить категорию">×</button>
      </div>`).join("") || `<p class="hint">Пока нет категорий.</p>`}</div>
    <label>Новая категория</label>
    <input id="new_cat_name" placeholder="например: Стрижки">
    <button class="btn-primary" onclick="addCategory()">Добавить категорию</button>
    <button class="btn-secondary" onclick="closeModal(); renderServices()">Готово</button>
  `);
}

async function addCategory() {
  const name = document.getElementById("new_cat_name").value.trim();
  if (!name) return;
  await api("/service-categories", { method: "POST", body: JSON.stringify({ name }) });
  openCategoriesManager();
}

async function deleteCategory(id) {
  if (!confirm("Удалить категорию? Услуги останутся, но без категории.")) return;
  await api(`/service-categories/${id}`, { method: "DELETE" });
  openCategoriesManager();
}

// ---------- ФОТО УСЛУГИ ----------
async function openServicePhotos(service) {
  const photos = await api(`/services/${service.id}/photos`);
  openModal(`
    <h2>Фото: ${service.name}</h2>
    <div id="photos_list">${renderPhotosList(photos)}</div>
    <label>Ссылка на фото (URL)</label>
    <input id="ph_url" placeholder="https://...">
    <label>Подпись (когда агенту показывать это фото)</label>
    <input id="ph_desc" placeholder="например: пример после окрашивания в блонд">
    <button class="btn-primary" onclick='addServicePhoto(${service.id})'>Добавить фото</button>
    <button class="btn-secondary" onclick='openServiceForm(${JSON.stringify(service)})'>← Назад к услуге</button>
  `);
}

function renderPhotosList(photos) {
  if (!photos.length) return `<p style="font-size:13px;color:var(--muted)">Пока нет фото для этой услуги.</p>`;
  return photos.map(p => `
    <div class="photo-row">
      <img src="${p.photo_url}" alt="" onerror="this.style.visibility='hidden'">
      <div class="photo-info">${p.tag_description}</div>
      <button class="photo-del" onclick="deleteServicePhoto(${p.service_id}, ${p.id})" title="Удалить фото">×</button>
    </div>
  `).join("");
}

async function addServicePhoto(serviceId) {
  const photo_url = document.getElementById("ph_url").value.trim();
  const tag_description = document.getElementById("ph_desc").value.trim();
  if (!photo_url || !tag_description) { alert("Заполни ссылку и подпись"); return; }
  await api(`/services/${serviceId}/photos`, { method: "POST", body: JSON.stringify({ photo_url, tag_description }) });
  const photos = await api(`/services/${serviceId}/photos`);
  document.getElementById("photos_list").innerHTML = renderPhotosList(photos);
  document.getElementById("ph_url").value = "";
  document.getElementById("ph_desc").value = "";
}

async function deleteServicePhoto(serviceId, photoId) {
  await api(`/services/${serviceId}/photos/${photoId}`, { method: "DELETE" });
  const photos = await api(`/services/${serviceId}/photos`);
  document.getElementById("photos_list").innerHTML = renderPhotosList(photos);
}

async function saveService(id) {
  const num = (id) => {
    const v = document.getElementById(id).value.trim();
    return v === "" ? null : Number(v);
  };
  const catValue = document.getElementById("f_category").value;
  const payload = {
    name: document.getElementById("f_name").value.trim(),
    category_id: catValue && catValue !== "__new__" ? Number(catValue) : null,
    price_min: num("f_price_min"),
    price_max: num("f_price_max"),
    duration_min: num("f_dur_min"),
    duration_max: num("f_dur_max"),
    active: document.getElementById("f_active").checked ? 1 : 0,
    description: document.getElementById("f_desc").value,
  };
  if (!payload.name) { alert("Укажи название услуги"); return; }
  if (id) {
    await api(`/services/${id}`, { method: "PUT", body: JSON.stringify(payload) });
  } else {
    await api("/services", { method: "POST", body: JSON.stringify(payload) });
  }
  closeModal();
  renderServices();
}

async function deleteService(id) {
  if (!confirm("Удалить эту услугу?")) return;
  await api(`/services/${id}`, { method: "DELETE" });
  closeModal();
  renderServices();
}

// ---------- МАСТЕРА ----------
let allServicesCache = [];
let allEmployeesCache = [];

async function renderEmployees() {
  document.getElementById("fab").style.display = "block";
  document.getElementById("fab").onclick = () => openEmployeeForm();
  const [employees, services] = await Promise.all([api("/employees"), api("/services")]);
  allServicesCache = services;
  const servicesById = Object.fromEntries(services.map(s => [s.id, s]));
  const content = document.getElementById("content");
  if (!employees.length) {
    content.innerHTML = `<div class="empty">Пока нет мастеров. Нажми "+", чтобы добавить.</div>`;
    return;
  }
  const schedules = await Promise.all(employees.map(e => api(`/employees/${e.id}/schedule`)));

  content.innerHTML = employees.map((e, i) => `
    <div class="card" onclick='openEmployeeForm(${attrJson(e)})'>
      <h3>${e.name}</h3>
      <p>${describeSchedule(schedules[i])}</p>
      <div class="chips">
        ${e.service_ids.length
          ? e.service_ids.slice(0, 6).map(id => servicesById[id] ? `<span class="chip">${servicesById[id].name}</span>` : "").join("") +
            (e.service_ids.length > 6 ? `<span class="chip">+${e.service_ids.length - 6}</span>` : "")
          : `<span class="chip">услуги не назначены</span>`}
      </div>
    </div>
  `).join("");
}

// Короткая запись графика: подряд идущие дни с одинаковым временем сливаем в «Пн–Сб 09:00–18:00»
function describeSchedule(schedule) {
  if (!schedule || !schedule.length) return "график не указан";
  const byDay = {};
  schedule.forEach(d => (byDay[d.weekday] = d));
  const parts = [];
  let run = null;
  for (const { n, short } of WEEKDAYS) {
    const d = byDay[n];
    const key = d ? `${d.start_minutes}-${d.end_minutes}` : null;
    if (run && run.key === key) {
      run.last = short;
    } else {
      if (run && run.key) parts.push(run);
      run = key ? { key, first: short, last: short, d } : null;
    }
  }
  if (run && run.key) parts.push(run);
  return parts
    .map(p => `${p.first === p.last ? p.first : p.first + "–" + p.last} ${minutesToTime(p.d.start_minutes)}–${minutesToTime(p.d.end_minutes)}`)
    .join(", ");
}

// Дни недели в порядке Пн→Вс; number — как Date.getDay()
const WEEKDAYS = [
  { n: 1, short: "Пн" }, { n: 2, short: "Вт" }, { n: 3, short: "Ср" }, { n: 4, short: "Чт" },
  { n: 5, short: "Пт" }, { n: 6, short: "Сб" }, { n: 0, short: "Вс" },
];

function minutesToTime(m) {
  return `${String(Math.floor(m / 60)).padStart(2, "0")}:${String(m % 60).padStart(2, "0")}`;
}
function timeToMinutes(t) {
  const [h, m] = String(t).split(":").map(Number);
  return h * 60 + (m || 0);
}
// Варианты времени с шагом 30 минут — выбор из списка, чтобы не было разнобоя при ручном вводе
function timeOptions(selectedMinutes) {
  let out = "";
  for (let m = 0; m <= 24 * 60 - 30; m += 30) {
    out += `<option value="${m}" ${m === selectedMinutes ? "selected" : ""}>${minutesToTime(m)}</option>`;
  }
  return out;
}

function renderScheduleRows(schedule) {
  const byDay = {};
  (schedule || []).forEach(d => (byDay[d.weekday] = d));
  return WEEKDAYS.map(({ n, short }) => {
    const day = byDay[n];
    const on = !!day;
    return `
      <div class="sched-row ${on ? "" : "off"}" id="sched_row_${n}">
        <label class="sched-day">
          <input type="checkbox" id="sched_on_${n}" ${on ? "checked" : ""} onchange="toggleScheduleDay(${n})">
          <span>${short}</span>
        </label>
        <select id="sched_from_${n}" ${on ? "" : "disabled"}>${timeOptions(day ? day.start_minutes : 540)}</select>
        <span class="sched-dash">–</span>
        <select id="sched_to_${n}" ${on ? "" : "disabled"}>${timeOptions(day ? day.end_minutes : 1080)}</select>
      </div>`;
  }).join("");
}

function toggleScheduleDay(n) {
  const on = document.getElementById(`sched_on_${n}`).checked;
  document.getElementById(`sched_from_${n}`).disabled = !on;
  document.getElementById(`sched_to_${n}`).disabled = !on;
  document.getElementById(`sched_row_${n}`).classList.toggle("off", !on);
}

function collectSchedule() {
  const days = [];
  for (const { n, short } of WEEKDAYS) {
    if (!document.getElementById(`sched_on_${n}`).checked) continue;
    const start = Number(document.getElementById(`sched_from_${n}`).value);
    const end = Number(document.getElementById(`sched_to_${n}`).value);
    if (start >= end) return { error: `${short}: начало рабочего дня должно быть раньше конца` };
    days.push({ weekday: n, start_minutes: start, end_minutes: end });
  }
  return { days };
}

async function openEmployeeForm(employee = {}) {
  const isEdit = !!employee.id;
  const selectedIds = new Set(employee.service_ids || []);
  const schedule = isEdit ? await api(`/employees/${employee.id}/schedule`) : [];
  openModal(`
    <h2>${isEdit ? "Редактировать мастера" : "Новый мастер"}</h2>
    <label>Имя</label>
    <input id="e_name" value="${employee.name || ""}">
    <label>Цвет в календаре</label>
    <div class="color-grid" id="e_colors">
      ${CAL_PALETTE.map(c => `
        <div class="color-swatch ${employee.color === c ? "active" : ""}" style="background:${c}"
             data-color="${c}" onclick="pickEmployeeColor('${c}')"></div>`).join("")}
    </div>
    <label>График работы</label>
    <div class="sched">${renderScheduleRows(schedule)}</div>
    <p class="hint">Снятая галочка — выходной. Записаться вне этих часов будет нельзя.</p>
    ${isEdit ? `<button class="link-btn" onclick='openTimeOff(${attrJson(employee)})'>Отпуска и отгулы →</button>` : ""}
    <label>Какие услуги делает</label>
    <div>
      ${allServicesCache.length
        ? allServicesCache.map(s => `
          <label class="chip-select">
            <input type="checkbox" value="${s.id}" ${selectedIds.has(s.id) ? "checked" : ""} class="e_service_cb">
            ${s.name}
          </label>
        `).join("")
        : `<p style="font-size:12px;color:var(--muted)">Сначала добавь услуги на вкладке "Услуги".</p>`}
    </div>
    <button class="btn-primary" onclick="saveEmployee(${employee.id || "null"})">Сохранить</button>
    ${isEdit ? `<button class="btn-secondary" onclick="deleteEmployee(${employee.id})">Удалить мастера</button>` : ""}
  `);
}

function pickEmployeeColor(c) {
  document.querySelectorAll("#e_colors .color-swatch").forEach(s => s.classList.toggle("active", s.dataset.color === c));
}

async function saveEmployee(id) {
  const name = document.getElementById("e_name").value.trim();
  if (!name) { alert("Укажи имя мастера"); return; }

  const sched = collectSchedule();
  if (sched.error) { alert(sched.error); return; }

  const service_ids = Array.from(document.querySelectorAll(".e_service_cb:checked")).map(cb => parseInt(cb.value));
  const activeSwatch = document.querySelector("#e_colors .color-swatch.active");
  const color = activeSwatch ? activeSwatch.dataset.color : null;
  const payload = { name, service_ids, color };

  let employeeId = id;
  if (id) {
    await api(`/employees/${id}`, { method: "PUT", body: JSON.stringify(payload) });
  } else {
    const created = await api("/employees", { method: "POST", body: JSON.stringify(payload) });
    employeeId = created.id;
  }
  await api(`/employees/${employeeId}/schedule`, { method: "PUT", body: JSON.stringify({ days: sched.days }) });

  closeModal();
  renderEmployees();
}

// ---------- ОТПУСКА И ОТГУЛЫ ----------
const MONTHS_SHORT = ["янв","фев","мар","апр","мая","июн","июл","авг","сен","окт","ноя","дек"];
function humanDateShort(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr + "T00:00:00");
  if (isNaN(d)) return dateStr;
  const cur = new Date().getFullYear();
  return `${d.getDate()} ${MONTHS_SHORT[d.getMonth()]}${d.getFullYear() !== cur ? " " + d.getFullYear() : ""}`;
}
// «23 июл» для одного дня или «23 июл – 5 авг» для диапазона
function timeOffPeriod(t) {
  const from = humanDateShort(t.date);
  if (t.date_end && t.date_end > t.date) return `${from} – ${humanDateShort(t.date_end)}`;
  return from;
}
let timeOffAllDay = true;

async function openTimeOff(employee) {
  const items = await api(`/employees/${employee.id}/time-off`);
  timeOffAllDay = true;
  openModal(`
    <h2>Отпуска и отгулы: ${employee.name}</h2>
    <div id="timeoff_list">${
      items.length
        ? items.map(t => `
          <div class="timeoff-item">
            <div>
              <b>${timeOffPeriod(t)}</b>
              <span>${t.start_minutes == null ? "весь день" : `${minutesToTime(t.start_minutes)}–${minutesToTime(t.end_minutes)}`}${t.reason ? " · " + t.reason : ""}</span>
            </div>
            <button class="photo-del" onclick='deleteTimeOff(${attrJson(employee)}, ${t.id})' title="Удалить">×</button>
          </div>`).join("")
        : `<p class="hint">Ничего не запланировано.</p>`
    }</div>

    <h3 style="margin:18px 0 10px">Добавить</h3>
    <div class="row">
      <div><label>С какого дня</label><input id="to_date" type="date" value="${todayStr()}"></div>
      <div><label>По какой день</label><input id="to_date_end" type="date" placeholder="если один день — пусто"></div>
    </div>
    <p class="hint">Для отпуска на неделю-две укажи оба дня. Для одного дня второе поле оставь пустым.</p>

    <label>На сколько</label>
    <div class="seg" id="to_seg">
      <button type="button" class="active" onclick="setTimeOffAllDay(true)">Весь день</button>
      <button type="button" onclick="setTimeOffAllDay(false)">Часть дня</button>
    </div>
    <div class="row" id="to_times" style="display:none">
      <div><label>С</label><select id="to_from">${timeOptions(540)}</select></div>
      <div><label>До</label><select id="to_to">${timeOptions(1080)}</select></div>
    </div>

    <label>Причина (необязательно)</label>
    <input id="to_reason" placeholder="отпуск, обучение, обед">

    <div class="form-actions">
      <button class="btn-secondary" onclick='openEmployeeForm(${attrJson(employee)})'>← К мастеру</button>
      <button class="btn-primary" onclick='addTimeOff(${attrJson(employee)})'>Добавить</button>
    </div>
  `);
}

function setTimeOffAllDay(v) {
  timeOffAllDay = v;
  document.querySelectorAll("#to_seg button").forEach((b, i) => b.classList.toggle("active", (i === 0) === v));
  document.getElementById("to_times").style.display = v ? "none" : "flex";
}

async function addTimeOff(employee) {
  const date = document.getElementById("to_date").value;
  if (!date) { alert("Выбери дату начала"); return; }
  const dateEndRaw = document.getElementById("to_date_end").value;
  if (dateEndRaw && dateEndRaw < date) { alert("Дата окончания раньше начала"); return; }

  const body = {
    date,
    date_end: dateEndRaw || null,
    start_minutes: timeOffAllDay ? null : Number(document.getElementById("to_from").value),
    end_minutes: timeOffAllDay ? null : Number(document.getElementById("to_to").value),
    reason: document.getElementById("to_reason").value.trim(),
  };
  if (!timeOffAllDay && body.start_minutes >= body.end_minutes) { alert("Начало должно быть раньше конца"); return; }
  await api(`/employees/${employee.id}/time-off`, { method: "POST", body: JSON.stringify(body) });
  openTimeOff(employee);
}

async function deleteTimeOff(employee, id) {
  await api(`/employees/${employee.id}/time-off/${id}`, { method: "DELETE" });
  openTimeOff(employee);
}

async function deleteEmployee(id) {
  if (!confirm("Удалить этого мастера?")) return;
  await api(`/employees/${id}`, { method: "DELETE" });
  closeModal();
  renderEmployees();
}

// ---------- КАЛЕНДАРЬ ЗАПИСЕЙ (главный экран) ----------
// Колонки — мастера, строки — время. Запись рисуется блоком, высота = длительность.
const CAL_ROW_H = 44;        // высота одного часа в пикселях
const CAL_MIN_H = 18;        // минимальная высота блока, чтобы короткая запись читалась
let calDate = todayStr();
let calFilterEmployee = null; // null = все мастера; иначе id одного выбранного
let calView = "day";          // day = колонки по мастерам, week = колонки по дням

// Запасная палитра, если у мастера ещё не задан цвет
const CAL_PALETTE = ["#b8824f", "#7c9473", "#9c6b8e", "#6b8ea4", "#c08552", "#8a7a9c"];
function empColor(emp, idx) {
  return emp.color || CAL_PALETTE[idx % CAL_PALETTE.length];
}

function todayStr(d = new Date()) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}
function shiftDate(dateStr, days) {
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() + days);
  return todayStr(d);
}
function fmtMinutes(m) {
  return `${String(Math.floor(m / 60)).padStart(2, "0")}:${String(m % 60).padStart(2, "0")}`;
}
function minutesOfDay(dt) {
  const m = String(dt || "").match(/[T ](\d{1,2}):(\d{2})/);
  return m ? Number(m[1]) * 60 + Number(m[2]) : null;
}

// Понедельник недели, в которую попадает дата
function weekStart(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() - ((d.getDay() + 6) % 7));
  return todayStr(d);
}
function setCalView(v) { calView = v; renderCalendar(); }

function calViewToggle() {
  return `<div class="cal-view">
    <button class="${calView === "day" ? "active" : ""}" onclick="setCalView('day')">День</button>
    <button class="${calView === "week" ? "active" : ""}" onclick="setCalView('week')">Неделя</button>
  </div>`;
}

async function renderCalendar() {
  if (calView === "week") return renderCalendarWeek();

  document.getElementById("fab").style.display = "block";
  document.getElementById("fab").onclick = () => openVisitForm({ requested_datetime: `${calDate}T10:00` });

  const data = await api(`/calendar?date=${calDate}`);
  const d = new Date(calDate + "T00:00:00");
  const dayNames = ["воскресенье", "понедельник", "вторник", "среда", "четверг", "пятница", "суббота"];
  const isToday = calDate === todayStr();

  // Показываем только тех, кто сегодня работает или у кого есть записи —
  // иначе в выходной экран забит пустыми колонками.
  let staff = data.employees.filter(e =>
    e.start_minutes != null || data.bookings.some(b => b.employee_id === e.id)
  );
  if (!staff.length) staff = data.employees;

  // Если выбранного мастера сегодня нет среди работающих — сбрасываем фильтр
  if (calFilterEmployee && !staff.some(e => e.id === calFilterEmployee)) calFilterEmployee = null;
  const shown = calFilterEmployee ? staff.filter(e => e.id === calFilterEmployee) : staff;

  // Цвет по id, чтобы он совпадал в шапке, на записях и в переключателе
  const colorById = {};
  data.employees.forEach((e, i) => { colorById[e.id] = empColor(e, i); });

  // Границы сетки: от начала самой ранней смены до конца самой поздней,
  // но с запасом, если запись выходит за график.
  let from = 24 * 60, to = 0;
  for (const e of staff) {
    if (e.start_minutes != null) { from = Math.min(from, e.start_minutes); to = Math.max(to, e.end_minutes); }
  }
  for (const b of data.bookings) {
    const s = minutesOfDay(b.requested_datetime);
    if (s == null) continue;
    const end = minutesOfDay(b.end_datetime) ?? s + (b.duration_minutes || 60);
    from = Math.min(from, s); to = Math.max(to, end);
  }
  if (from >= to) { from = 9 * 60; to = 20 * 60; }
  from = Math.floor(from / 60) * 60;
  to = Math.ceil(to / 60) * 60;

  const hours = [];
  for (let m = from; m < to; m += 60) hours.push(m);
  const gridH = ((to - from) / 60) * CAL_ROW_H;
  const posOf = (min) => ((min - from) / 60) * CAL_ROW_H;

  const stats = {
    всего: data.bookings.filter(b => !["cancelled", "no_show"].includes(b.status)).length,
    выручка: data.bookings
      .filter(b => !["cancelled", "no_show"].includes(b.status))
      .reduce((s, b) => s + (b.charged_amount || 0), 0),
    отменено: data.bookings.filter(b => ["cancelled", "no_show"].includes(b.status)).length,
  };

  document.getElementById("content").innerHTML = `
    <div class="cal-bar">
      <button class="cal-nav" onclick="calShift(-1)" title="Предыдущий день">‹</button>
      <input type="date" id="cal_date" value="${calDate}" onchange="calSet(this.value)">
      <button class="cal-nav" onclick="calShift(1)" title="Следующий день">›</button>
      <button class="cal-today" onclick="calSet('${todayStr()}')">Сегодня</button>
      ${calViewToggle()}
      <div class="spacer"></div>
      <div class="cal-title">${isToday ? "Сегодня" : dayNames[d.getDay()]}
        <span>${d.getDate()} ${["янв","фев","мар","апр","мая","июн","июл","авг","сен","окт","ноя","дек"][d.getMonth()]}</span>
      </div>
    </div>

    <div class="cal-stats">
      <div class="cal-stat"><b>${stats.всего}</b><span>записей</span></div>
      <div class="cal-stat"><b>${stats.выручка ? Math.round(stats.выручка) : "—"}</b><span>PLN за день</span></div>
      <div class="cal-stat"><b>${staff.filter(e => e.start_minutes != null).length}</b><span>мастеров в смене</span></div>
      ${stats.отменено ? `<div class="cal-stat"><b>${stats.отменено}</b><span>отменено</span></div>` : ""}
    </div>

    <div class="cal-picker">
      <button class="${!calFilterEmployee ? "active" : ""}" onclick="calPickEmployee(null)">Все</button>
      ${staff.map(e => `
        <button class="${e.id === calFilterEmployee ? "active" : ""}" onclick="calPickEmployee(${e.id})">
          <i class="dot" style="background:${colorById[e.id]}"></i>${e.name}
        </button>
      `).join("")}
    </div>

    ${!shown.length ? `<p class="empty">На этот день нет ни смен, ни записей.</p>` : `
    <div class="cal-wrap"><div class="cal-scroll">
      <div class="cal-grid" style="grid-template-columns: 46px repeat(${shown.length}, minmax(${shown.length === 1 ? 220 : 140}px, 1fr));">
        <div class="cal-head corner"></div>
        ${shown.map(e => `
          <div class="cal-head" style="box-shadow: inset 0 -3px 0 ${colorById[e.id]}">
            <i class="dot" style="background:${colorById[e.id]}"></i>${e.name}
            <small>${e.start_minutes != null ? fmtMinutes(e.start_minutes) + "–" + fmtMinutes(e.end_minutes) : "выходной"}</small>
          </div>`).join("")}

        <div class="cal-time" style="height:${gridH}px">
          ${hours.map(h => `<div style="height:${CAL_ROW_H}px">${fmtMinutes(h)}</div>`).join("")}
        </div>

        ${shown.map(e => renderCalColumn(e, data, { from, to, gridH, posOf, isToday, color: colorById[e.id] })).join("")}
      </div>
    </div></div>`}
  `;

  // Сразу прокручиваем к текущему времени, чтобы не искать его вручную
  const scroller = document.querySelector(".cal-scroll");
  if (scroller && isToday) {
    const now = new Date().getHours() * 60 + new Date().getMinutes();
    if (now > from && now < to) scroller.scrollTop = Math.max(0, posOf(now) - 80);
  }
}

function renderCalColumn(emp, data, { from, to, gridH, posOf, isToday, color }) {
  const events = data.bookings.filter(b => b.employee_id === emp.id);
  const offs = data.timeOff.filter(t => t.employee_id === emp.id);
  const nowMin = new Date().getHours() * 60 + new Date().getMinutes();

  // Нерабочее время внутри сетки затеняем
  const offBlocks = [];
  if (emp.start_minutes == null) {
    offBlocks.push({ start: from, end: to });
  } else {
    if (emp.start_minutes > from) offBlocks.push({ start: from, end: emp.start_minutes });
    if (emp.end_minutes < to) offBlocks.push({ start: emp.end_minutes, end: to });
  }

  return `
    <div class="cal-col" style="height:${gridH}px" onclick="calColClick(event, ${emp.id}, ${from})" title="Нажми на свободное место, чтобы создать запись">
      ${offBlocks.map(o => `<div class="cal-off" style="position:absolute;left:0;right:0;top:${posOf(o.start)}px;height:${posOf(o.end) - posOf(o.start)}px"></div>`).join("")}
      ${Array.from({ length: (to - from) / 60 }, (_, i) => `
        <div class="cal-hour" style="position:absolute;left:0;right:0;top:${i * CAL_ROW_H}px;height:${CAL_ROW_H}px">
          <div class="cal-half" style="height:${CAL_ROW_H / 2}px"></div>
        </div>`).join("")}

      ${offs.map(t => {
        const s = t.start_minutes ?? from, e = t.end_minutes ?? to;
        return `<div class="cal-ev off" onclick="event.stopPropagation()" style="top:${posOf(s)}px;height:${Math.max(CAL_MIN_H, posOf(e) - posOf(s))}px">
                  <b>${t.reason || "Не работает"}</b></div>`;
      }).join("")}

      ${layoutEvents(events).map(({ b, s, e, lane, lanes }) => {
        const muted = ["cancelled", "no_show"].includes(b.status);
        const done = b.status === "completed";
        const name = b.client_full_name || b.client_name || "Без имени";
        const label = b.custom_service_label || b.service_name || "";
        const w = 100 / lanes;
        // Отменённые — блёклые, завершённые — приглушённый цвет, остальные — полный цвет мастера
        const bg = muted ? "#c9c2ba" : done ? color + "cc" : color;
        return `<div class="cal-ev${muted ? " cancelled" : ""}"
                     style="top:${posOf(s)}px;height:${Math.max(CAL_MIN_H, posOf(e) - posOf(s))}px;
                            left:calc(${lane * w}% + 3px); right:auto; width:calc(${w}% - 6px);
                            background:${bg}"
                     onclick='event.stopPropagation(); openVisitForm(${JSON.stringify(b).replace(/'/g, "&#39;")})' title="${fmtMinutes(s)}–${fmtMinutes(e)} · ${name} · ${label}">
                  <b>${fmtMinutes(s)} ${name}</b><i>${label}</i>
                  ${!muted && !done ? `<button class="ev-done" title="Завершить визит"
                     onclick='event.stopPropagation(); openQuickComplete(${JSON.stringify(b).replace(/'/g, "&#39;")})'>✓</button>` : ""}
                </div>`;
      }).join("")}

      ${isToday && nowMin > from && nowMin < to
        ? `<div class="cal-now" style="top:${posOf(nowMin)}px"></div>` : ""}
    </div>`;
}

// ---------- НЕДЕЛЬНЫЙ ВИД: колонки — дни, цвет блока — мастер ----------
async function renderCalendarWeek() {
  document.getElementById("fab").style.display = "block";
  const start = weekStart(calDate);
  document.getElementById("fab").onclick = () => openVisitForm({ requested_datetime: `${start}T10:00` });

  const data = await api(`/calendar?date=${start}&days=7`);

  const colorById = {};
  data.employees.forEach((e, i) => { colorById[e.id] = empColor(e, i); });
  const nameById = {};
  data.employees.forEach(e => { nameById[e.id] = e.name; });

  // Фильтр по мастеру работает и здесь
  const bookings = calFilterEmployee
    ? data.bookings.filter(b => b.employee_id === calFilterEmployee)
    : data.bookings;

  const days = [];
  for (let i = 0; i < 7; i++) {
    const dateStr = shiftDate(start, i);
    const wd = new Date(dateStr + "T00:00:00").getDay();
    const sched = (data.schedules || []).filter(s =>
      s.weekday === wd && (!calFilterEmployee || s.employee_id === calFilterEmployee));
    days.push({
      date: dateStr,
      weekday: wd,
      open: sched.length ? Math.min(...sched.map(s => s.start_minutes)) : null,
      close: sched.length ? Math.max(...sched.map(s => s.end_minutes)) : null,
      events: bookings.filter(b => b.requested_datetime.slice(0, 10) === dateStr),
      offs: (data.timeOff || []).filter(t =>
        t.date <= dateStr && (t.date_end || t.date) >= dateStr &&
        (!calFilterEmployee || t.employee_id === calFilterEmployee)),
    });
  }

  // Границы сетки — по всем дням недели сразу, чтобы колонки были выровнены
  let from = 24 * 60, to = 0;
  for (const day of days) {
    if (day.open != null) { from = Math.min(from, day.open); to = Math.max(to, day.close); }
    for (const b of day.events) {
      const s = minutesOfDay(b.requested_datetime);
      if (s == null) continue;
      to = Math.max(to, minutesOfDay(b.end_datetime) ?? s + (b.duration_minutes || 60));
      from = Math.min(from, s);
    }
  }
  if (from >= to) { from = 9 * 60; to = 20 * 60; }
  from = Math.floor(from / 60) * 60;
  to = Math.ceil(to / 60) * 60;

  const hours = [];
  for (let m = from; m < to; m += 60) hours.push(m);
  const gridH = ((to - from) / 60) * CAL_ROW_H;
  const posOf = (min) => ((min - from) / 60) * CAL_ROW_H;

  const live = bookings.filter(b => !["cancelled", "no_show"].includes(b.status));
  const revenue = live.reduce((s, b) => s + (b.charged_amount || 0), 0);
  const WD_SHORT = ["вс", "пн", "вт", "ср", "чт", "пт", "сб"];
  const MON = ["янв","фев","мар","апр","мая","июн","июл","авг","сен","окт","ноя","дек"];
  const endDate = new Date(days[6].date + "T00:00:00");
  const startDate = new Date(start + "T00:00:00");

  document.getElementById("content").innerHTML = `
    <div class="cal-bar">
      <button class="cal-nav" onclick="calShift(-7)" title="Предыдущая неделя">‹</button>
      <input type="date" id="cal_date" value="${calDate}" onchange="calSet(this.value)">
      <button class="cal-nav" onclick="calShift(7)" title="Следующая неделя">›</button>
      <button class="cal-today" onclick="calSet('${todayStr()}')">Эта неделя</button>
      ${calViewToggle()}
      <div class="spacer"></div>
      <div class="cal-title">Неделя
        <span>${startDate.getDate()} ${MON[startDate.getMonth()]} — ${endDate.getDate()} ${MON[endDate.getMonth()]}</span>
      </div>
    </div>

    <div class="cal-stats">
      <div class="cal-stat"><b>${live.length}</b><span>записей за неделю</span></div>
      <div class="cal-stat"><b>${revenue ? Math.round(revenue).toLocaleString("ru-RU") : "—"}</b><span>PLN</span></div>
      <div class="cal-stat"><b>${new Set(live.map(b => b.client_id).filter(Boolean)).size}</b><span>клиентов</span></div>
    </div>

    <div class="cal-picker">
      <button class="${!calFilterEmployee ? "active" : ""}" onclick="calPickEmployee(null)">Все</button>
      ${data.employees.map((e, i) => `
        <button class="${e.id === calFilterEmployee ? "active" : ""}" onclick="calPickEmployee(${e.id})">
          <span class="dot" style="background:${empColor(e, i)}"></span>${e.name}
        </button>`).join("")}
    </div>

    <div class="cal-wrap"><div class="cal-scroll">
      <div class="cal-grid" style="grid-template-columns: 46px repeat(7, minmax(96px, 1fr));">
        <div class="cal-head corner"></div>
        ${days.map(day => {
          const dd = new Date(day.date + "T00:00:00");
          const isT = day.date === todayStr();
          return `<div class="cal-head${isT ? " today-head" : ""}">${WD_SHORT[day.weekday]} ${dd.getDate()}
            <small>${day.open != null ? day.events.length + " зап." : "выходной"}</small>
          </div>`;
        }).join("")}

        <div class="cal-time" style="height:${gridH}px">
          ${hours.map(h => `<div style="height:${CAL_ROW_H}px">${fmtMinutes(h)}</div>`).join("")}
        </div>

        ${days.map(day => renderWeekColumn(day, { from, to, gridH, posOf, colorById, nameById })).join("")}
      </div>
    </div></div>
  `;

  const scroller = document.querySelector(".cal-scroll");
  if (scroller) {
    const now = new Date().getHours() * 60 + new Date().getMinutes();
    if (now > from && now < to) scroller.scrollTop = Math.max(0, posOf(now) - 80);
  }
}

function renderWeekColumn(day, { from, to, gridH, posOf, colorById, nameById }) {
  const isToday = day.date === todayStr();
  const nowMin = new Date().getHours() * 60 + new Date().getMinutes();

  const offBlocks = [];
  if (day.open == null) offBlocks.push({ start: from, end: to });
  else {
    if (day.open > from) offBlocks.push({ start: from, end: day.open });
    if (day.close < to) offBlocks.push({ start: day.close, end: to });
  }

  return `
    <div class="cal-col" style="height:${gridH}px" onclick="calWeekClick(event, '${day.date}', ${from})">
      ${offBlocks.map(o => `<div class="cal-off" style="position:absolute;left:0;right:0;top:${posOf(o.start)}px;height:${posOf(o.end) - posOf(o.start)}px"></div>`).join("")}
      ${Array.from({ length: (to - from) / 60 }, (_, i) => `
        <div class="cal-hour" style="position:absolute;left:0;right:0;top:${i * CAL_ROW_H}px;height:${CAL_ROW_H}px">
          <div class="cal-half" style="height:${CAL_ROW_H / 2}px"></div>
        </div>`).join("")}

      ${day.offs.map(t => {
        const s = t.start_minutes ?? from, e = t.end_minutes ?? to;
        return `<div class="cal-ev off" onclick="event.stopPropagation()" style="top:${posOf(s)}px;height:${Math.max(CAL_MIN_H, posOf(e) - posOf(s))}px">
                  <b>${nameById[t.employee_id] || ""}: ${t.reason || "не работает"}</b></div>`;
      }).join("")}

      ${layoutEvents(day.events).map(({ b, s, e, lane, lanes }) => {
        const muted = ["cancelled", "no_show"].includes(b.status);
        const done = b.status === "completed";
        const color = colorById[b.employee_id] || "#b8824f";
        const name = b.client_full_name || b.client_name || "Без имени";
        const label = b.custom_service_label || b.service_name || "";
        const w = 100 / lanes;
        const bg = muted ? "#c9c2ba" : done ? color + "cc" : color;
        return `<div class="cal-ev${muted ? " cancelled" : ""}"
                     style="top:${posOf(s)}px;height:${Math.max(CAL_MIN_H, posOf(e) - posOf(s))}px;
                            left:calc(${lane * w}% + 2px); right:auto; width:calc(${w}% - 4px); background:${bg}"
                     onclick='event.stopPropagation(); openVisitForm(${JSON.stringify(b).replace(/'/g, "&#39;")})'
                     title="${fmtMinutes(s)}–${fmtMinutes(e)} · ${name} · ${label} · ${nameById[b.employee_id] || ""}">
                  <b>${fmtMinutes(s)} ${name}</b><i>${label}</i>
                  ${!muted && !done ? `<button class="ev-done" title="Завершить визит"
                     onclick='event.stopPropagation(); openQuickComplete(${JSON.stringify(b).replace(/'/g, "&#39;")})'>✓</button>` : ""}
                </div>`;
      }).join("")}

      ${isToday && nowMin > from && nowMin < to ? `<div class="cal-now" style="top:${posOf(nowMin)}px"></div>` : ""}
    </div>`;
}

function calWeekClick(event, dateStr, from) {
  const col = event.currentTarget;
  const y = event.clientY - col.getBoundingClientRect().top;
  let minutes = from + Math.round((y / CAL_ROW_H * 60) / 30) * 30;
  minutes = Math.max(0, Math.min(23 * 60 + 30, minutes));
  openVisitForm({ requested_datetime: `${dateStr}T${fmtMinutes(minutes)}`, employee_id: calFilterEmployee || null });
}

  openModal(`

    ${b.price_min && b.price_max && b.price_min !== b.price_max
      ? `<div class="quick-days">
           ${[b.price_min, Math.round((b.price_min + b.price_max) / 2), b.price_max]
             .filter((v, i, a) => a.indexOf(v) === i)
             .map(v => `<button type="button" onclick="document.getElementById('qc_amount').value=${v}">${v}</button>`).join("")}
         </div>` : ""}

async function quickStatus(id, status) {
  const raw = document.getElementById("qc_amount")?.value;
  const payload = { status };
  // «Не пришёл» — денег нет, сумму не пишем
  if (status === "completed" && raw !== "" && raw != null) payload.charged_amount = parseFloat(raw);
  await api(`/bookings/${id}/status`, { method: "POST", body: JSON.stringify(payload) });
  closeModal();

// Клик по свободному месту колонки → новая запись этому мастеру на это время
function calColClick(event, employeeId, from) {
  const col = event.currentTarget;
  const y = event.clientY - col.getBoundingClientRect().top;
  let minutes = from + Math.round((y / CAL_ROW_H * 60) / 30) * 30; // округляем к получасу
  minutes = Math.max(0, Math.min(23 * 60 + 30, minutes));
  const time = fmtMinutes(minutes);
  openVisitForm({ requested_datetime: `${calDate}T${time}`, employee_id: employeeId });
}

// Пересекающиеся по времени записи ставим рядом, а не друг на друга.
// Каждой записи ищем первую дорожку, которая к её началу уже освободилась.
function layoutEvents(events) {
  const items = [];
  for (const b of events) {
    const s = minutesOfDay(b.requested_datetime);
    if (s == null) continue;
    items.push({ b, s, e: minutesOfDay(b.end_datetime) ?? s + (b.duration_minutes || 60) });
  }
  items.sort((a, b) => a.s - b.s || a.e - b.e);

  const laneEnds = [];
  for (const it of items) {
    let lane = laneEnds.findIndex((end) => end <= it.s);
    if (lane === -1) { lane = laneEnds.length; laneEnds.push(0); }
    laneEnds[lane] = it.e;
    it.lane = lane;
  }

  // Ширину считаем по группе пересечений, иначе одна накладка сжимает весь день
  for (const it of items) {
    const group = items.filter((o) => o.s < it.e && o.e > it.s);
    it.lanes = Math.max(...group.map((o) => o.lane)) + 1;
  }
  return items;
}

function calShift(days) { calDate = shiftDate(calDate, days); renderCalendar(); }
function calSet(value) { if (value) { calDate = value; renderCalendar(); } }
function calPickEmployee(id) { calFilterEmployee = id; renderCalendar(); }

// Прибавляем минуты к "2026-07-23T09:00", не уходя в часовые пояса через Date.
function addMinutes(datetimeLocal, minutes) {
  if (!datetimeLocal) return null;
  const [date, time] = datetimeLocal.split("T");
  const total = Number(time.slice(0, 2)) * 60 + Number(time.slice(3, 5)) + minutes;
  const capped = Math.min(total, 23 * 60 + 59); // визит не переносим на следующие сутки
  return `${date}T${String(Math.floor(capped / 60)).padStart(2, "0")}:${String(capped % 60).padStart(2, "0")}`;
}

// Фактическая длительность визита: из времени окончания, иначе из услуги, иначе час.
function bookingDuration(booking) {
  const start = minutesOfDay(booking.requested_datetime);
  const end = minutesOfDay(booking.end_datetime);
  if (start != null && end != null && end > start) return end - start;
  const svc = allServicesCache.find(s => s.id === booking.service_id);
  return (svc && (svc.duration_max || svc.duration_min)) || 60;
}

// Справочники нужны и в календаре, где карточку клиента ещё не открывали
async function ensureCaches() {
  if (!allEmployeesCache.length || !allServicesCache.length) {
    const [employees, services] = await Promise.all([api("/employees"), api("/services")]);
    allEmployeesCache = employees;
    allServicesCache = services;
  }
}

const MONTHS_GEN = ["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"];
const WEEKDAYS_FULL = ["воскресенье","понедельник","вторник","среда","четверг","пятница","суббота"];

// «2026-07-28» → «вторник, 28 июля»: родной формат браузера показывает 07/28/2026
function humanDate(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr + "T00:00:00");
  if (isNaN(d)) return dateStr;
  return `${WEEKDAYS_FULL[d.getDay()]}, ${d.getDate()} ${MONTHS_GEN[d.getMonth()]}`;
}

function fmtDurationLabel(m) {
  const h = Math.floor(m / 60), min = m % 60;
  return (h ? h + " ч" : "") + (min ? (h ? " " : "") + min + " мин" : "");
}

// Мастера, которые делают выбранную услугу. Без услуги — все.
function employeesForService(serviceId) {
  if (!serviceId) return allEmployeesCache;
  const matching = allEmployeesCache.filter(e => (e.service_ids || []).includes(serviceId));
  return matching.length ? matching : allEmployeesCache;
}

let visitFormState = {};

async function openVisitForm(booking = {}) {
  await ensureCaches();
  const isEdit = !!booking.id;

  visitFormState = {
    id: booking.id || null,
    clientId: booking.client_id || (currentClient && currentClient.id) || null,
    clientName: booking.client_full_name || booking.client_name || (currentClient && currentClient.full_name) || "",
    serviceId: booking.service_id || null,
    date: (booking.requested_datetime || "").slice(0, 10) || todayStr(),
    time: (booking.requested_datetime || "").slice(11, 16) || "10:00",
    duration: bookingDuration(booking),
    booking,
  };

  openModal(`
    <h2>${isEdit ? "Запись" : "Новая запись"}</h2>
    <div id="visit_form_body"></div>
  `);
  renderVisitFormBody();
}

  document.getElementById("visit_form_body").innerHTML = `
    ${st.clientId

      ? found.slice(0, 8).map(c => `
          <button type="button" onclick="visitPickClient(${c.id}, ${attrJson(c.full_name || "")})">

      : `<p class="hint">Никого не нашлось. Клиента можно завести на вкладке «Клиенты».</p>`;
  }, 250);
}

async function saveVisit() {
  const st = visitFormState;
  if (!st.clientId) { alert("Выбери клиента"); return; }

  const start = `${st.date}T${document.getElementById("v_time").value}`;
  const minutes = parseInt(document.getElementById("v_duration").value) || 60;

  const payload = {
    client_id: st.clientId,
    employee_id: parseInt(document.getElementById("v_employee").value) || null,
    service_id: parseInt(document.getElementById("v_service").value) || null,
    custom_service_label: document.getElementById("v_label").value || null,
    requested_datetime: start,
    end_datetime: addMinutes(start, minutes),
    charged_amount: parseFloat(document.getElementById("v_amount").value) || null,
    status: document.getElementById("v_status").value,
    comment: document.getElementById("v_comment").value,
    formula: document.getElementById("v_formula").value,
  };

  if (st.id) {
    await api(`/bookings/${st.id}`, { method: "PUT", body: JSON.stringify(payload) });
  } else {
    await api("/bookings", { method: "POST", body: JSON.stringify(payload) });
  }
  afterVisitSaved();
}

// ---------- ПОЛНОЭКРАННЫЙ ПРОСМОТР ФОТО ----------
let lbPhotos = [];
let lbIndex = 0;

function openLightbox(photos, index) {
  lbPhotos = Array.isArray(photos) ? photos : [];
  if (!lbPhotos.length) return;
  lbIndex = Math.max(0, Math.min(index || 0, lbPhotos.length - 1));
  document.getElementById("lightbox").classList.add("open");
  document.body.style.overflow = "hidden";
  showLightboxPhoto();
}

function showLightboxPhoto() {
  const p = lbPhotos[lbIndex];
  document.getElementById("lb_img").src = p.photo_url;
  document.getElementById("lb_caption").textContent = p.caption || "";
  document.getElementById("lb_counter").textContent =
    lbPhotos.length > 1 ? `${lbIndex + 1} / ${lbPhotos.length}` : "";
  const multiple = lbPhotos.length > 1;
  document.querySelector(".lb-prev").hidden = !multiple;
  document.querySelector(".lb-next").hidden = !multiple;
}

function lightboxNav(event, step) {
  if (event) event.stopPropagation();
  lbIndex = (lbIndex + step + lbPhotos.length) % lbPhotos.length;
  showLightboxPhoto();
}

function closeLightbox(event, force) {
  // закрываем по фону или крестику, но не по самой картинке
  if (event && !force && event.target.tagName === "IMG") return;
  document.getElementById("lightbox").classList.remove("open");
  document.getElementById("lb_img").src = "";
  document.body.style.overflow = "";
}

document.addEventListener("keydown", (e) => {
  if (!document.getElementById("lightbox").classList.contains("open")) return;
  if (e.key === "Escape") closeLightbox(null, true);
  else if (e.key === "ArrowLeft") lightboxNav(null, -1);
  else if (e.key === "ArrowRight") lightboxNav(null, 1);
});

// Свайп влево/вправо на телефоне
let lbTouchX = null;
document.getElementById("lightbox").addEventListener("touchstart", (e) => {
  lbTouchX = e.changedTouches[0].clientX;
}, { passive: true });
document.getElementById("lightbox").addEventListener("touchend", (e) => {
  if (lbTouchX === null || lbPhotos.length < 2) return;
  const dx = e.changedTouches[0].clientX - lbTouchX;
  if (Math.abs(dx) > 50) lightboxNav(null, dx < 0 ? 1 : -1);
  lbTouchX = null;
}, { passive: true });

// Снимок с телефона весит 3–5 МБ, а в панели столько не нужно: ужимаем до 1600px
// и пережимаем в JPEG. Место в хранилище и трафик на мобильном экономятся раз в десять.
const PHOTO_MAX_SIDE = 1600;
const PHOTO_QUALITY = 0.82;

async function compressImage(file) {
  if (!file.type.startsWith("image/")) return file;
  try {
    const bitmap = await createImageBitmap(file);
    const scale = Math.min(1, PHOTO_MAX_SIDE / Math.max(bitmap.width, bitmap.height));
    const canvas = document.createElement("canvas");
    canvas.width = Math.round(bitmap.width * scale);
    canvas.height = Math.round(bitmap.height * scale);
    canvas.getContext("2d").drawImage(bitmap, 0, 0, canvas.width, canvas.height);
    bitmap.close();

    const blob = await new Promise(res => canvas.toBlob(res, "image/jpeg", PHOTO_QUALITY));
    // Уже сжатое маленькое фото пережимать смысла нет — станет только хуже
    if (!blob || blob.size >= file.size) return file;
    return new File([blob], file.name.replace(/\.[^.]+$/, "") + ".jpg", { type: "image/jpeg" });
  } catch {
    return file; // формат, который браузер не умеет читать (бывает с HEIC) — шлём как есть
  }
}

async function uploadVisitPhotos(bookingId, files) {
  if (!files || !files.length) return;
  const caption = document.getElementById("vph_caption").value.trim();
  const status = document.getElementById("vph_status");
  let saved = 0;

  for (const [i, original] of [...files].entries()) {
    status.textContent = `Загружаю ${i + 1} из ${files.length}...`;
    const file = await compressImage(original);

    const form = new FormData();
    form.append("file", file);
    form.append("caption", caption);
    // FormData сам ставит content-type с разделителем — свой заголовок тут ставить нельзя
    const res = await fetch(`${API_BASE}/bookings/${bookingId}/photos`, {
      method: "POST", headers: { "X-Admin-Token": ADMIN_TOKEN }, body: form,
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || data.error) { status.textContent = data.error || "Не удалось загрузить фото"; return; }
    saved++;
  }

  const photos = await api(`/bookings/${bookingId}/photos`);
  document.getElementById("photos_list").innerHTML = renderVisitPhotosList(photos, bookingId);
  document.getElementById("vph_file").value = "";
  status.textContent = saved ? `Загружено: ${saved}` : "";
}

function renderVisitPhotosList(photos, bookingId) {
  if (!photos.length) return `<p style="font-size:13px;color:var(--muted)">Пока нет фото.</p>`;
  return photos.map((p, i) => `
    <div class="photo-row">
      <img src="${p.photo_url}" alt="" referrerpolicy="no-referrer" style="cursor:zoom-in" onerror="this.style.visibility='hidden'" onclick='openLightbox(${attrJson(photos)}, ${i})'>
      <div class="photo-info">${p.caption || ""}</div>
      <button class="photo-del" onclick="deleteVisitPhoto(${bookingId}, ${p.id})" title="Удалить фото">×</button>
    </div>
  `).join("");
}

async function addVisitPhoto(bookingId) {
  const photo_url = document.getElementById("vph_url").value.trim();

  if (!photo_url) { alert("Укажи ссылку на фото"); return; }
